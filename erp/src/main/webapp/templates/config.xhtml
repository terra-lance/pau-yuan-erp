<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<div id="layout-config" class="layout-config">
		<div class="layout-config-content">
			<a href="#" id="layout-config-button" class="layout-config-button">
				<i class="pi pi-cog" />
			</a>
			<h:form id="config-form" styleClass="layout-config-form">
				<div class="layout-config-header">
					<h3>Theme Customization</h3>
				</div>

				<p:outputPanel id="lightdark-panel"
					styleClass="layout-config-section options">
					<span class="section-name">Layout Mode</span>
					<div class="grid layout-config-options">
						<p:selectOneRadio layout="responsive" columns="2"
							value="#{sessionBean.userPreference.darkMode}">
							<f:selectItem itemLabel="Light" itemValue="light" />
							<f:selectItem itemLabel="Dark" itemValue="dark" />
							<f:selectItem itemLabel="Dim" itemValue="dim" />
							<p:ajax listener="#{sessionBean.savePreference()}"
								oncomplete="setTimeout(function() {document.forms[0].submit()}, 500)" />
						</p:selectOneRadio>
					</div>
				</p:outputPanel>

				<p:outputPanel id="menumodes-panel"
					styleClass="layout-config-section options">
					<span class="section-name">Menu Mode</span>
					<div class="grid layout-config-options">
						<p:selectOneRadio layout="responsive" columns="2"
							value="#{sessionBean.userPreference.menuMode}"
							onchange="PrimeFaces.RainConfigurator.changeMenuMode(event.target.value)">
							<f:selectItem itemLabel="Static"
								itemValue="layout-static layout-static-active" />
							<f:selectItem itemLabel="Overlay" itemValue="layout-overlay" />
							<f:selectItem itemLabel="Horizontal"
								itemValue="layout-horizontal" />
							<f:selectItem itemLabel="Slim" itemValue="layout-slim" />
							<f:selectItem itemLabel="Slim-Plus" itemValue="layout-slim-plus" />
							<p:ajax listener="#{sessionBean.savePreference()}"
								update="menumodes-panel" />
						</p:selectOneRadio>
					</div>
				</p:outputPanel>

				<p:outputPanel id="profilemenu-panel"
					styleClass="layout-config-section options">
					<span class="section-name">Profile Mode</span>
					<div class="grid layout-config-options">
						<p:selectOneRadio layout="responsive" columns="2"
							value="#{sessionBean.userPreference.profileMode}">
							<f:selectItem itemLabel="Popup" itemValue="popup" />
							<f:selectItem itemLabel="Inline" itemValue="inline" />
							<p:ajax listener="#{sessionBean.savePreference()}"
								oncomplete="setTimeout(function() {document.forms[0].submit()}, 500)" />
						</p:selectOneRadio>
					</div>
				</p:outputPanel>

				<p:outputPanel id="outlined-panel"
					styleClass="layout-config-section options">
					<span class="section-name">Form Type</span>
					<div class="grid layout-config-options">
						<p:selectOneRadio layout="responsive" columns="2"
							value="#{sessionBean.userPreference.inputStyle}"
							onchange="PrimeFaces.RainConfigurator.updateInputStyle(event.target.value)">
							<f:selectItem itemLabel="Outlined" itemValue="outlined" />
							<f:selectItem itemLabel="Filled" itemValue="filled" />
							<p:ajax listener="#{sessionBean.savePreference()}" />
						</p:selectOneRadio>
					</div>
				</p:outputPanel>

				<p:outputPanel id="primarycolors-panel"
					styleClass="layout-config-section colors">
					<span class="section-name">Layout Colors</span>
					<div class="grid layout-config-colors">
						<ui:repeat value="#{guestPreferences.layoutPrimaryColors}"
							var="layoutPrimaryColor">
							<div class="col col-fixed">
								<p:commandLink styleClass="layout-config-option"
									actionListener="#{sessionBean.setLayoutPrimaryColor(layoutPrimaryColor.file)}"
									onstart="PrimeFaces.RainConfigurator.beforeResourceChange()"
									update=":config-form:primarycolors-panel"
									oncomplete="PrimeFaces.RainConfigurator.changePrimaryColor('#{layoutPrimaryColor.file}', '#{sessionBean.userPreference.darkMode}'),
                                    PrimeFaces.RainConfigurator.changeComponentsTheme('#{layoutPrimaryColor.file}', '#{sessionBean.userPreference.darkMode}')">
									<span class="layout-config-option-color"
										style="background-color: #{layoutPrimaryColor.color}"
										title="#{layoutPrimaryColor.name}" />
									<ui:fragment
										rendered="#{layoutPrimaryColor.file eq sessionBean.userPreference.layoutPrimaryColor}">
										<span class="layout-config-option-check-mask"> <i
											class="pi pi-check" />
										</span>
									</ui:fragment>
								</p:commandLink>
							</div>
						</ui:repeat>
					</div>
				</p:outputPanel>
			</h:form>
		</div>
	</div>
</ui:composition>
