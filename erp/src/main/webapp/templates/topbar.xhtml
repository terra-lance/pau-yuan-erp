<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:po="http://primefaces.org/rain">

	<div class="layout-topbar">
		<div class="layout-topbar-wrapper">
			<div class="layout-topbar-left">
				<h:link id="logolink" outcome="#{homeController.index()}"
					styleClass="layout-topbar-logo">
					<p:graphicImage
						name="#{sessionBean.userPreference.lightLogo ? 'project-white-logo.png' : 'project-black-logo.png'}"
						library="project" />
				</h:link>
			</div>
			<div class="layout-topbar-right">
				<div class="menu-button-wrapper">
					<p:commandLink styleClass="menu-button">
						<div class="menu-button-bars">
							<span /> <span /> <span />
						</div>
						<div class="menu-button-times">
							<span /> <span />
						</div>
						
						<p:ajax event="click" delay="150" process="@(.page)"
							update="@(.page)" />
					</p:commandLink>
				</div>
				<ul class="layout-topbar-actions">
					<ui:fragment
						rendered="#{sessionBean.userPreference.profileMode == 'popup' ? true : false}">
						<li class="topbar-item user-profile">
							<div class="align-right">
								<h:outputText style="color: white;"
									value="#{sessionBean.user.name}" />
							</div>
						</li>

						<li class="topbar-item user-profile">
							<a href="#"> 
								<i style="color: white" class="pi pi-ellipsis-v" />
							</a>

							<ul>
								<li>
									<p:commandButton style="width:100%" value="Sign Out"
										icon="fa fa-door-open" action="#{sessionBean.logout()}"
										ajax="true" />
								</li>
								
								<li>
									<p:commandButton style="width:100%" value="Open Cash Register"
										icon="fa fa-cash-register" action="#{homeController.openCashRegister()}"
										ajax="true" rendered="#{sessionBean.authorize('Cash Register')}">
										<p:confirm header="Confirmation"
											message="Do you wish to open the cash register?"
											icon="ui-icon-alert" />
									</p:commandButton>
								</li>
							</ul>
						</li>
					</ui:fragment>

				</ul>
			</div>
		</div>

	</div>

</ui:composition>
