<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pr="http://primefaces.org/rain">

	<div class="menu-wrapper">
		<div class="layout-menu-container">
			<ui:fragment
				rendered="#{sessionBean.userPreference.profileMode == 'popup' ? false : true}">
				<div class="layout-profile">
					<a class="layout-profile-button" href="#"> <span
						class="image-name"> <i class="fa-solid fa-user fa-2x"
							style="margin-right: .75rem"></i> <span
							class="layout-profile-userinfo"> <span
								class="layout-profile-name">#{sessionBean.user.name}</span> <span
								class="layout-profile-mail">#{sessionBean.user.email}</span>
						</span>
					</span> <i class="layout-profile-icon pi pi-chevron-down" />
					</a>
					<ul class="layout-profile-menu">
						<li><p:commandLink style="text-decoration: none"
								action="#{sessionBean.logout()}" ajax="true">
								<i class="fa-solid fa-door-open fa-lg"></i>
								<span>Sign Out</span>
							</p:commandLink></li>
					</ul>
				</div>
			</ui:fragment>

			<h:form id="menuform">
				<pr:menu widgetVar="RainMenuWidget">
					<p:submenu label="Retail Transaction" icon="fa fa-gears fa-lg"
						rendered="#{sessionBean.authorize('Purchase Order')
						|| sessionBean.authorize('Purchase Return')
						|| sessionBean.authorize('Sales Order')
						|| sessionBean.authorize('Tax Invoice')
						|| sessionBean.authorize('Sales Return')
						|| sessionBean.authorize('Sales Payment')}">
						<p:menuitem value="Purchase Order"
							icon="fa fa-shopping-cart fa-lg" outcome="purchase-order-index"
							rendered="#{sessionBean.authorize('Purchase Order')}" />

						<p:menuitem value="Purchase Return" icon="fa fa-rotate-left fa-lg"
							outcome="purchase-return-index"
							rendered="#{sessionBean.authorize('Purchase Return')}" />

						<p:menuitem value="Sales Order" icon="fa fa-cash-register fa-lg"
							outcome="sales-order-index"
							rendered="#{sessionBean.authorize('Sales Order')}" />

						<p:menuitem value="Tax Invoice"
							icon="fa fa-file-invoice-dollar fa-lg"
							outcome="tax-invoice-index"
							rendered="#{sessionBean.authorize('Tax Invoice')}" />

						<p:menuitem value="Sales Return" icon="fa fa-rotate-left fa-lg"
							outcome="sales-return-index"
							rendered="#{sessionBean.authorize('Sales Return')}" />

						<p:menuitem value="Sales Payment" icon="fa fa-dollar-sign fa-lg"
							outcome="sales-payment-index"
							rendered="#{sessionBean.authorize('Sales Payment')}" />
					</p:submenu>

					<p:submenu label="Retail Enquiry" icon="fa fa-circle-info fa-lg"
						rendered="#{sessionBean.authorize('Inventory Enquiry')
						|| sessionBean.authorize('Sales Item Enquiry')}">
						<p:menuitem value="Inventory Enquiry" icon="fa fa-cubes fa-lg"
							outcome="inventory-enquiry-index"
							rendered="#{sessionBean.authorize('Inventory Enquiry')}" />
						<p:menuitem value="Sales Item Enquiry" icon="fa fa-scroll fa-lg"
							outcome="sales-item-enquiry-index"
							rendered="#{sessionBean.authorize('Sales Item Enquiry')}" />
					</p:submenu>

					<p:submenu label="Retail Report"
						icon="fa fa-circle-clipboard fa-lg"
						rendered="#{sessionBean.authorize('End of Day Report')
						|| sessionBean.authorize('Frame Unit Cost Report')}">
						<p:menuitem value="End of Day Report" icon="fa fa-clipboard fa-lg"
							outcome="end-of-day-report-index"
							rendered="#{sessionBean.authorize('End of Day Report')}" />
						<p:menuitem value="Frame Unit Cost Report" icon="fa fa-clipboard fa-lg"
							outcome="frame-unit-cost-report-index"
							rendered="#{sessionBean.authorize('Frame Unit Cost Report')}" />
					</p:submenu>

					<p:submenu label="Retail Master" icon="fa fa-gears fa-lg"
						rendered="#{sessionBean.authorize('Customer')
						|| sessionBean.authorize('Company')
						|| sessionBean.authorize('Brand')
						|| sessionBean.authorize('Lens')
						|| sessionBean.authorize('Frame')
						|| sessionBean.authorize('Payment Method')
						|| sessionBean.authorize('Service Type')
						|| sessionBean.authorize('Tax')}">
						<p:menuitem value="Customer" icon="fa fa-address-card fa-lg"
							outcome="customer-index"
							rendered="#{sessionBean.authorize('Customer')}" />

						<p:menuitem value="Company" icon="fa fa-briefcase fa-lg"
							outcome="company-index"
							rendered="#{sessionBean.authorize('Company')}" />

						<p:menuitem value="Brand" icon="fa fa-tag fa-lg"
							outcome="brand-index"
							rendered="#{sessionBean.authorize('Brand')}" />

						<p:menuitem value="Lens" icon="fa fa-regular fa-circle fa-lg"
							outcome="lens-index" rendered="#{sessionBean.authorize('Lens')}" />

						<p:menuitem value="Frame" icon="fa fa-glasses fa-lg"
							outcome="frame-index"
							rendered="#{sessionBean.authorize('Frame')}" />

						<p:menuitem value="Payment Method" icon="fa fa-money-bill fa-lg"
							outcome="payment-method-index"
							rendered="#{sessionBean.authorize('Payment Method')}" />

						<p:menuitem value="Service Type" icon="fa fa-bell-concierge fa-lg"
							outcome="service-type-index"
							rendered="#{sessionBean.authorize('Service Type')}" />

						<p:menuitem value="Tax" icon="fa fa-percentage fa-lg"
							outcome="tax-index" rendered="#{sessionBean.authorize('Tax')}" />
					</p:submenu>

					<p:submenu label="System" icon="fa fa-gears fa-lg"
						rendered="#{sessionBean.authorize('User')
						|| sessionBean.authorize('User Group')
						|| sessionBean.authorize('Configurations')}">
						<p:menuitem value="User" icon="fa fa-user fa-lg"
							outcome="user-index" rendered="#{sessionBean.authorize('User')}" />

						<p:menuitem value="User Group" icon="fa fa-user-group fa-lg"
							outcome="user-group-index"
							rendered="#{sessionBean.authorize('User Group')}" />

						<p:menuitem value="Configuration" icon="fa fa-gears fa-lg"
							outcome="configuration-index"
							rendered="#{sessionBean.authorize('Configuration')}" />
					</p:submenu>
				</pr:menu>
			</h:form>
		</div>
	</div>

</ui:composition>
