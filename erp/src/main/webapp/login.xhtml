<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:head>
	<link rel="shortcut icon" type="image/x-icon" href="images/favicon.ico" />

	<f:facet name="first">
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<meta name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<link rel="icon"
			href="#{request.contextPath}/resources/images/favicon.ico"
			type="image/x-icon"></link>
	</f:facet>

	<p:growl showDetail="true" sticky="true">
		<p:autoUpdate />
	</p:growl>

	<title><h:outputText value="#{sessionBean.project}" /> - Login</title>
</h:head>

<h:body styleClass="login-body">
	<div class="login-image">
		<p:graphicImage name="images/pages/bg-header-login.png"
			library="rain-layout" />
	</div>

	<div class="login-card">
		<h1>
			<h:outputText value="#{sessionBean.project}" />
			<span> LOGIN</span>
		</h1>

		<span> Welcome </span>

		<h:form id="loginForm">
			<div class="form-group">
				<span>Username</span>
				<p:inputText id="username" value="#{sessionBean.username}"
					required="true" autocomplete="off" />
			</div>

			<div class="form-group">
				<span>Password</span>
				<p:password id="password" value="#{sessionBean.password}"
					required="true" autocomplete="off" />
			</div>

			<div class="form-group">
				<span>System</span>
				<p:selectOneMenu style="width:100%" id="system"
					value="#{sessionBean.system}" autoWidth="false">
					<f:selectItems value="#{sessionBean.systems}" var="system"
						itemValue="#{system}" itemLabel="#{system.description}" />
				</p:selectOneMenu>
			</div>

			<div>
				<p:commandButton style="width:100%" value="Sign In"
					action="#{sessionBean.login()}" ajax="true" />
			</div>
		</h:form>
	</div>

	<h:outputStylesheet name="css/#{sessionBean.userPreference.layout}.css"
		library="rain-layout" />
</h:body>

</html>
