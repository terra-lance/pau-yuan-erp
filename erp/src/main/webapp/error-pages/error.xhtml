<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:head>
	<f:facet name="first">
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<meta name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
	</f:facet>
	<title><h:outputText value="#{sessionBean.project}" /></title>
	<script type="text/javascript"
		src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</h:head>

<h:body styleClass="login-body">
	<div class="login-image">
		<p:graphicImage name="images/pages/bg-header-login.png"
			library="rain-layout" />
	</div>

	<div class="card">
		<h1>
			<h:outputText value="#{sessionBean.project}" />
		</h1>

		<span> Error Page </span>
	</div>

	<h:outputStylesheet name="css/#{sessionBean.userPreference.layout}.css"
		library="rain-layout" />
</h:body>

</html>
