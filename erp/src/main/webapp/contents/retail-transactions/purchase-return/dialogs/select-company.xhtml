<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="selectCompanyForm">
		<p:dialog value="Selection" widgetVar="selectCompanyWV"
			resizable="false" responsive="true" modal="true">

			<p:panel styleClass="dialog" header="Select Company">
				<p:dataTable styleClass="data-table" rowIndexVar="rowIndex"
					var="object" rowKey="#{object}"
					value="#{purchaseReturnController.companies}" paginator="true"
					paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
					rows="10" rowsPerPageTemplate="10,20,30,40,50" lazy="true">

					<p:column styleClass="index-cell">
						<p:commandButton icon="fa fa-fw fa-check"
							action="#{purchaseReturnController.selectCompany(object)}"
							update="@(.page)" />
					</p:column>

					<p:column headerText="Company Code" filterBy="#{object.code}"
						filterMatchMode="contains" sortBy="#{object.code}">
						<h:outputText value="#{object.code}" />
					</p:column>
				</p:dataTable>
			</p:panel>
		</p:dialog>
	</h:form>

</ui:composition>
