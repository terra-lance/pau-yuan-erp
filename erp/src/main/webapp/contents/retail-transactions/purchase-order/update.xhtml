<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://java.sun.com/jsp/jstl/core">

	<h:form id="updateForm" class="page">
		<p:outputPanel
			rendered="#{purchaseOrderController.page == purchaseOrderController.naviUpdate}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<div class="title">
						<h:outputText styleClass="module-name"
							value="#{purchaseOrderController.title} - Update Record" />
					</div>
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Save" icon="fa fa-fw fa-save"
						action="#{purchaseOrderController.saveUpdate()}" update="@(.page)" />
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{purchaseOrderController.home()}" immediate="true"
						update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Document No.</h6>
						<p:inputText styleClass="full-width read-only" id="documentNo"
							value="#{purchaseOrderController.object.documentNo}"
							readonly="true" />

						<h6>Document Date</h6>
						<p:calendar styleClass="full-width" id="documentDate"
							value="#{purchaseOrderController.object.documentDate}"
							pattern="dd/MM/yyyy" />
													
						<h6>Discount Remark</h6>
						<p:inputText styleClass="full-width" id="discountRemark"
							value="#{purchaseOrderController.object.discountRemark}"
							autocomplete="off" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Company</h6>
						<p:outputPanel styleClass="ui-inputgroup" id="company">
							<p:inputText styleClass="full-width read-only"
								value="#{purchaseOrderController.object.company.code}"
								autocomplete="off" readonly="true" />
							<p:commandButton icon="fa fa-search"
								action="#{purchaseOrderController.lookupCompany()}"
								process="@form"
								disabled="#{purchaseOrderController.object.frames.size() != 0 
								|| purchaseOrderController.object.lenses.size() != 0}" />
						</p:outputPanel>

						<h6>Supplier Invoice</h6>
						<p:inputText styleClass="full-width" id="supplierInvoice"
							value="#{purchaseOrderController.object.supplierInvoice}"
							autocomplete="off" />

						<h6>Total</h6>
						<p:inputNumber styleClass="full-width read-only" id="total"
							value="#{purchaseOrderController.object.total}"
							decimalPlaces="#{purchaseOrderController.configuration.monetaryDecimal}"
							readonly="true" />
					</div>
				</div>

				<p:separator />

				<div class="grid">
					<div class="col-12 md:col-12 xl:col-12">
						<p:toolbar id="tabControl">
							<f:facet name="left">
								<p:selectOneButton value="#{purchaseOrderController.tabIndex}">
									<c:if test="#{purchaseOrderController.object.company.frame}">
										<f:selectItem itemValue="0" itemLabel="Frame" />
									</c:if>

									<c:if test="#{purchaseOrderController.object.company.lens}">
										<f:selectItem itemValue="1" itemLabel="Lens" />
									</c:if>

									<p:ajax event="change" process="@form" update="tabControl tab" />
								</p:selectOneButton>
							</f:facet>

							<f:facet name="right">
								<p:commandButton value="Order Frame" icon="fa fa-plus"
									action="#{purchaseOrderController.lookupFrame()}"
									process="@form" update="@form"
									rendered="#{purchaseOrderController.tabIndex == purchaseOrderController.tabFrame}" />

								<p:commandButton value="Order Lens" icon="fa fa-plus"
									action="#{purchaseOrderController.lookupLensSalesOrder()}"
									process="@form" update="@form"
									rendered="#{purchaseOrderController.tabIndex == purchaseOrderController.tabLens}" />
							</f:facet>
						</p:toolbar>

						<p:outputPanel id="tab">
							<p:outputPanel id="framePanel"
								styleClass="#{purchaseOrderController.tabIndex == purchaseOrderController.tabFrame ? '' : 'invisible'}">
								<br />

								<p:dataTable id="frameTable" styleClass="data-table"
									rowIndexVar="rowIndex" rowKey="#{frame}" var="frame"
									value="#{purchaseOrderController.object.listFrames}"
									reflow="true">

									<p:headerRow style="display:none"
										groupBy="#{detail.purchaseOrder.id}" />

									<p:column styleClass="index-cell">
										<p:rowToggler />
									</p:column>

									<p:column headerText="No." styleClass="index-cell">
										<h:outputText value="#{frame.line}" />
									</p:column>

									<p:column headerText="Brand">
										<h:outputText value="#{frame.frame.brand.code}" />
									</p:column>

									<p:column headerText="Model">
										<h:outputText value="#{frame.frame.code}" />
									</p:column>

									<p:column headerText="Type">
										<h:outputText value="#{frame.frame.type.description}" />
									</p:column>

									<p:column headerText="Color">
										<p:selectOneMenu styleClass="full-width"
											value="#{frame.color}" autoWidth="false">
											<f:selectItem itemLabel="Select" itemValue="" />
											<f:selectItems value="#{frame.frame.colors}" var="color"
												itemLabel="#{color.color}" itemValue="#{color.color}" />
										</p:selectOneMenu>
									</p:column>

									<p:column headerText="Qty.">
										<p:inputNumber styleClass="full-width"
											value="#{frame.quantity}" minValue="0" decimalPlaces="0"
											emptyValue="zero" autocomplete="off">
											<p:ajax event="blur" listener="#{frame.calculate()}"
												process="frameTable"
												update="taxAmount total 
												updateForm:frameTable:#{purchaseOrderController.object.listFrames.size() - 1}:frameTotalTax
												updateForm:frameTable:#{purchaseOrderController.object.listFrames.size() - 1}:frameTotal
												updateForm:total" />
										</p:inputNumber>
									</p:column>

									<p:column headerText="Unit Price">
										<p:inputNumber styleClass="full-width"
											value="#{frame.unitPrice}"
											decimalPlaces="#{purchaseOrderController.configuration.monetaryDecimal}"
											emptyValue="zero" autocomplete="off">
											<p:ajax event="blur" listener="#{frame.calculate()}"
												process="frameTable"
												update="taxAmount total 
												updateForm:frameTable:#{purchaseOrderController.object.listFrames.size() - 1}:frameTotalTax
												updateForm:frameTable:#{purchaseOrderController.object.listFrames.size() - 1}:frameTotal 
												updateForm:total" />
										</p:inputNumber>
									</p:column>

									<p:column headerText="Discount">
										<p:inputNumber styleClass="full-width"
											value="#{frame.discount}"
											decimalPlaces="#{purchaseOrderController.configuration.monetaryDecimal}"
											emptyValue="zero" autocomplete="off">
											<p:ajax event="blur" listener="#{frame.calculate()}"
												process="frameTable"
												update="taxAmount total 
												updateForm:frameTable:#{purchaseOrderController.object.listFrames.size() - 1}:frameTotalTax
												updateForm:frameTable:#{purchaseOrderController.object.listFrames.size() - 1}:frameTotal 
												updateForm:total" />
										</p:inputNumber>
									</p:column>

									<p:column headerText="Tax Rate">
										<p:inputNumber styleClass="full-width"
											value="#{frame.taxRate}" emptyValue="zero" autocomplete="off">
											<p:ajax event="blur" listener="#{frame.calculate()}"
												process="frameTable"
												update="taxAmount total 
												updateForm:frameTable:#{purchaseOrderController.object.listFrames.size() - 1}:frameTotalTax
												updateForm:frameTable:#{purchaseOrderController.object.listFrames.size() - 1}:frameTotal 
												updateForm:total" />
										</p:inputNumber>
									</p:column>

									<p:column headerText="Tax Amount" styleClass="align-right">
										<h:outputText id="taxAmount" value="#{frame.taxAmount}">
											<f:convertNumber
												pattern="#{purchaseOrderController.monetaryDecimalMask}" />
										</h:outputText>
									</p:column>

									<p:column headerText="Total" styleClass="align-right">
										<h:outputText id="total" value="#{frame.total}">
											<f:convertNumber
												pattern="#{purchaseOrderController.monetaryDecimalMask}" />
										</h:outputText>
									</p:column>

									<p:column headerText="Remark">
										<p:inputTextarea styleClass="full-width" id="remark"
											value="#{frame.remark}" rows="1" autocomplete="off" />
									</p:column>

									<p:column styleClass="single-action-cell">
										<p:commandButton class="rounded-button" id="deleteButton"
											icon="fa fa-trash-alt"
											action="#{purchaseOrderController.deleteFrame(frame)}"
											update="frameTable">
											<p:confirm header="Confirmation"
												message="Do you wish to delete this frame from this order?"
												icon="ui-icon-alert" />
										</p:commandButton>
										<p:tooltip styleClass="tooltip" for="deleteButton"
											value="Delete Frame" position="top"
											hideEvent="mouseleave click" />
									</p:column>

									<p:rowExpansion>
										<p:column>
											<p:dataTable styleClass="data-table"
												rowIndexVar="innerRowIndex" var="inventory"
												value="#{frame.listInventories}">

												<p:column headerText="No." styleClass="index-cell">
													<h:outputText value="#{innerRowIndex + 1}" />
												</p:column>

												<p:column headerText="Serial No./Barcode">
													<h:outputText value="#{inventory.serialNo}"
														converter="whiteSpaceConverter" />
												</p:column>

												<p:column headerText="Received"
													styleClass="double-action-cell">
													<p:selectBooleanCheckbox value="#{inventory.received}">
														<p:ajax event="change"
															listener="#{purchaseOrderController.receiveFrameInventory(inventory)}"
															update="receivedBy receivedDate" />
													</p:selectBooleanCheckbox>
												</p:column>

												<p:column headerText="Received By"
													styleClass="triple-action-cell">
													<h:outputText id="receivedBy"
														value="#{inventory.receivedBy.name}" />
												</p:column>

												<p:column headerText="Received On"
													styleClass="triple-action-cell">
													<h:outputText id="receivedDate"
														value="#{inventory.receivedDate}">
														<f:convertDateTime
															pattern="#{purchaseOrderController.configuration.timestampPattern}" />
													</h:outputText>
												</p:column>

												<p:column styleClass="double-action-cell">
													<p:commandButton class="rounded-button" id="printButton"
														icon="fa fa-print"
														action="#{purchaseOrderController.printFrameLabelByLine(inventory.id)}"
														style="margin-right: .3rem" ajax="false" />
													<p:tooltip styleClass="tooltip" for="printButton"
														value="Print Frame Label" position="top"
														hideEvent="mouseleave click" />

													<p:commandButton class="rounded-button" id="deleteButton"
														icon="fa fa-trash-alt"
														action="#{purchaseOrderController.deleteFrameInventory(frame, inventory)}"
														update="updateForm:frameTable">
														<p:confirm header="Confirmation"
															message="Do you wish to delete this frame inventory?"
															icon="ui-icon-alert" />
													</p:commandButton>
													<p:tooltip styleClass="tooltip" for="deleteButton"
														value="Delete Inventory" position="top"
														hideEvent="mouseleave click" />
												</p:column>
											</p:dataTable>
										</p:column>
									</p:rowExpansion>

									<p:summaryRow>
										<p:column colspan="10" styleClass="align-right">
											<h:outputText value="Total:" />
										</p:column>

										<p:column styleClass="align-right">
											<h:outputText id="frameTotalTax"
												value="#{purchaseOrderController.object.frameTotalTax}">
												<f:convertNumber
													pattern="#{purchaseOrderController.monetaryDecimalMask}" />
											</h:outputText>
										</p:column>

										<p:column styleClass="align-right">
											<h:outputText id="frameTotal"
												value="#{purchaseOrderController.object.frameTotal}">
												<f:convertNumber
													pattern="#{purchaseOrderController.monetaryDecimalMask}" />
											</h:outputText>
										</p:column>

										<p:column colspan="2" />
									</p:summaryRow>
								</p:dataTable>
							</p:outputPanel>

							<p:outputPanel id="lensPanel"
								styleClass="#{purchaseOrderController.tabIndex == purchaseOrderController.tabLens ? '' : 'invisible'}">

								<p:dataTable id="lensTable" styleClass="data-table"
									rowIndexVar="rowIndex" rowKey="#{lens}" var="lens"
									value="#{purchaseOrderController.object.listLenses}"
									reflow="true">

									<p:headerRow style="display:none"
										groupBy="#{detail.purchaseOrder.id}" />

									<p:column headerText="No." styleClass="index-cell">
										<h:outputText value="#{lens.line}" />
									</p:column>

									<p:column headerText="Sales Order">
										<h:outputText value="#{lens.salesLens.salesOrder.documentNo}" />
									</p:column>

									<p:column headerText="Side"
										styleClass="double-action-cell align-left">
										<h:outputText value="#{lens.salesLens.side.description}" />
									</p:column>

									<p:column headerText="Lens">
										<h:outputText value="#{lens.salesLens.summary}" />
									</p:column>

									<p:column headerText="Sub-Total">
										<p:inputNumber styleClass="full-width"
											value="#{lens.subtotal}"
											decimalPlaces="#{purchaseOrderController.configuration.monetaryDecimal}"
											emptyValue="zero" autocomplete="off">
											<p:ajax event="blur" listener="#{lens.calculate()}"
												process="lensTable"
												update="taxAmount total 
												updateForm:lensTable:#{purchaseOrderController.object.listLenses.size() - 1}:lensTotalTax
												updateForm:lensTable:#{purchaseOrderController.object.listLenses.size() - 1}:lensTotal" />
										</p:inputNumber>
									</p:column>

									<p:column headerText="Discount">
										<p:inputNumber styleClass="full-width"
											value="#{lens.discount}"
											decimalPlaces="#{purchaseOrderController.configuration.monetaryDecimal}"
											emptyValue="zero" autocomplete="off">
											<p:ajax event="blur" listener="#{lens.calculate()}"
												process="lensTable"
												update="taxAmount total 
												updateForm:lensTable:#{purchaseOrderController.object.listLenses.size() - 1}:lensTotalTax
												updateForm:lensTable:#{purchaseOrderController.object.listLenses.size() - 1}:lensTotal" />
										</p:inputNumber>
									</p:column>

									<p:column headerText="Tax Rate">
										<p:inputNumber styleClass="full-width" value="#{lens.taxRate}"
											emptyValue="zero" autocomplete="off">
											<p:ajax event="blur" listener="#{lens.calculate()}"
												process="lensTable"
												update="taxAmount total 
												updateForm:lensTable:#{purchaseOrderController.object.listLenses.size() - 1}:lensTotalTax
												updateForm:lensTable:#{purchaseOrderController.object.listLenses.size() - 1}:lensTotal" />
										</p:inputNumber>
									</p:column>

									<p:column headerText="Tax Amount" styleClass="align-right">
										<h:outputText id="taxAmount" value="#{lens.taxAmount}">
											<f:convertNumber
												pattern="#{purchaseOrderController.monetaryDecimalMask}" />
										</h:outputText>
									</p:column>

									<p:column headerText="Total" styleClass="align-right">
										<h:outputText id="total" value="#{lens.total}">
											<f:convertNumber
												pattern="#{purchaseOrderController.monetaryDecimalMask}" />
										</h:outputText>
									</p:column>

									<p:column styleClass="single-action-cell">
										<p:commandButton class="rounded-button" id="deleteButton"
											icon="fa fa-trash-alt"
											action="#{purchaseOrderController.deleteLens(lens)}"
											update="lensTable">
											<p:confirm header="Confirmation"
												message="Do you wish to delete this lens from this order?"
												icon="ui-icon-alert" />
										</p:commandButton>
										<p:tooltip styleClass="tooltip" for="deleteButton"
											value="Delete Lens" position="top"
											hideEvent="mouseleave click" />
									</p:column>

									<p:summaryRow>
										<p:column colspan="7" styleClass="align-right">
											<h:outputText value="Total:" />
										</p:column>

										<p:column styleClass="align-right">
											<h:outputText id="lensTotalTax"
												value="#{purchaseOrderController.object.lensTotalTax}">
												<f:convertNumber
													pattern="#{purchaseOrderController.monetaryDecimalMask}" />
											</h:outputText>
										</p:column>

										<p:column styleClass="align-right">
											<h:outputText id="lensTotal"
												value="#{purchaseOrderController.object.lensTotal}">
												<f:convertNumber
													pattern="#{purchaseOrderController.monetaryDecimalMask}" />
											</h:outputText>
										</p:column>

										<p:column />
									</p:summaryRow>
								</p:dataTable>
							</p:outputPanel>
						</p:outputPanel>
					</div>
				</div>

				<div class="card">
					<div class="grid">
						<div class="col-12 md:col-6 xl:col-3">
							<h6>User Created</h6>
							<p:inputText styleClass="full-width read-only" id="userCreated"
								value="#{purchaseOrderController.object.userCreated.name}"
								readonly="true" />
						</div>

						<div class="col-12 md:col-6 xl:col-3">
							<h6>Date Created</h6>
							<p:inputText styleClass="full-width read-only" id="dateCreated"
								value="#{purchaseOrderController.object.dateCreated}"
								readonly="true">
								<f:convertDateTime type="date"
									pattern="#{purchaseOrderController.configuration.timestampPattern}" />
							</p:inputText>
						</div>

						<div class="col-12 md:col-6 xl:col-3">
							<h6>User Modified</h6>
							<p:inputText styleClass="full-width read-only" id="userModified"
								value="#{purchaseOrderController.object.userModified.name}"
								readonly="true" />
						</div>

						<div class="col-12 md:col-6 xl:col-3">
							<h6>Date Modified</h6>
							<p:inputText styleClass="full-width read-only" id="dateModified"
								value="#{purchaseOrderController.object.dateModified}"
								readonly="true">
								<f:convertDateTime type="date"
									pattern="#{purchaseOrderController.configuration.timestampPattern}" />
							</p:inputText>
						</div>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
