<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:sec="http://www.springframework.org/security/tags">

	<ui:define name="title">
		<h:outputText value="#{purchaseOrderController.title}" />
	</ui:define>

	<ui:define name="content">
		<h:form id="indexForm" class="page">
			<p:outputPanel
				rendered="#{purchaseOrderController.page == purchaseOrderController.naviIndex}">
				<p:toolbar id="toolbar">
					<f:facet name="left">
						<h:outputText styleClass="module-name"
							value="#{purchaseOrderController.title}" />
					</f:facet>

					<f:facet name="right">
						<p:commandButton id="detailButton" icon="fa fa-search"
							action="#{purchaseOrderController.detail()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="detailButton"
							value="Record Detail" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="insertButton" icon="fa fa-plus"
							action="#{purchaseOrderController.insert()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="insertButton"
							value="Add Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="updateButton" icon="fa fa-edit"
							action="#{purchaseOrderController.update()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="updateButton"
							value="Update Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="deleteButton" icon="fa fa-trash-alt"
							action="#{purchaseOrderController.delete()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="deleteButton"
							value="Delete Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="printButton" icon="fa fa-print"
							action="#{purchaseOrderController.printFrameLabelByDocument()}"
							style="margin-right: .3rem" ajax="false" />
						<p:tooltip styleClass="tooltip" for="printButton"
							value="Print All Frame Labels" position="top"
							hideEvent="mouseleave click" />

						<p:commandButton id="postButton" icon="fa fa-envelope"
							action="#{purchaseOrderController.post()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="postButton"
							value="Post Record" position="top" hideEvent="mouseleave click" />
							
						<p:commandButton id="unpostButton" icon="fa fa-backward"
							action="#{purchaseOrderController.unpost()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="unpostButton"
							value="Unpost Record" position="top" hideEvent="mouseleave click" />
					</f:facet>
				</p:toolbar>
				<p:sticky target="toolbar" />

				<div class="card">
					<p:dataTable id="data" rowIndexVar="rowIndex" var="object"
						rowKey="#{object}" value="#{purchaseOrderController.objects}"
						emptyMessage="No record(s) found" widgetVar="dataTableWV"
						paginator="true"
						paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
						rows="10" rowsPerPageTemplate="10,20,30,40,50"
						selection="#{purchaseOrderController.selectedObjects}" lazy="true"
						reflow="true" resizableColumns="true">

						<p:ajax event="rowDblselect"
							listener="#{purchaseOrderController.detail}" update="@(.page)"
							global="false" />

						<p:column selectionMode="multiple"
							style="width:16px;text-align:center" />

						<p:column headerText="Date" sortBy="#{object.documentDate}">
							<h:outputText value="#{object.documentDate}">
								<f:convertDateTime
									pattern="#{purchaseOrderController.configuration.datePattern}" />
							</h:outputText>
						</p:column>

						<p:column headerText="Reference" filterBy="#{object.documentNo}"
							filterMatchMode="contains" sortBy="#{object.documentNo}">
							<h:outputText value="#{object.documentNo}" />
						</p:column>

						<p:column headerText="Company" filterBy="#{object.company.code}"
							filterMatchMode="contains" sortBy="#{object.company.code}">
							<h:outputText value="#{object.company.code}" />
						</p:column>

						<p:column headerText="Supplier IV."
							filterBy="#{object.supplierInvoice}" filterMatchMode="contains"
							sortBy="#{object.supplierInvoice}">
							<h:outputText value="#{object.supplierInvoice}" />
						</p:column>

						<p:column headerText="Amount" styleClass="align-right">
							<h:outputText value="#{object.total}">
								<f:convertNumber
									pattern="#{purchaseOrderController.monetaryDecimalMask}" />
							</h:outputText>
						</p:column>

						<p:column headerText="Posted" styleClass="double-action-cell"
							filterBy="#{object.posted}" filterMatchMode="equals"
							sortBy="#{object.posted}">
							<f:facet name="filter">
								<p:triStateCheckbox converter="triStateCheckboxBooleanConverter"
									onchange="PF('dataTableWV').filter()" />
							</f:facet>
							<p:selectBooleanCheckbox value="#{object.posted}" disabled="true" />
						</p:column>
					</p:dataTable>
				</div>
			</p:outputPanel>
		</h:form>

		<ui:include
			src="/contents/retail-transactions/purchase-order/detail.xhtml" />

		<ui:include
			src="/contents/retail-transactions/purchase-order/insert.xhtml" />

		<ui:include
			src="/contents/retail-transactions/purchase-order/update.xhtml" />

		<ui:include
			src="/contents/retail-transactions/purchase-order/delete.xhtml" />

		<ui:include
			src="/contents/retail-transactions/purchase-order/dialogs/select-company.xhtml" />

		<ui:include
			src="/contents/retail-transactions/purchase-order/dialogs/select-frame.xhtml" />

		<ui:include
			src="/contents/retail-transactions/purchase-order/dialogs/select-sales-lens.xhtml" />
	</ui:define>

</ui:composition>
