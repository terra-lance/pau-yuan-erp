<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="selectCustomerForm">
		<p:dialog value="Selection" widgetVar="selectCustomerWV"
			resizable="false" responsive="true" modal="true">

			<p:panel styleClass="dialog" header="Select Customer">
				<p:dataTable styleClass="data-table" rowIndexVar="rowIndex"
					var="object" rowKey="#{object}"
					value="#{salesReturnController.customers}" paginator="true"
					paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
					rows="10" rowsPerPageTemplate="10,20,30,40,50" lazy="true">

					<p:column styleClass="index-cell">
						<p:commandButton icon="fa fa-fw fa-check"
							action="#{salesReturnController.selectCustomer(object)}"
							update="@(.page)" />
					</p:column>

					<p:column headerText="Customer Code" filterBy="#{object.code}"
						filterMatchMode="contains" sortBy="#{object.code}">
						<h:outputText value="#{object.code}" />
					</p:column>

					<p:column headerText="Name" filterBy="#{object.name}"
						filterMatchMode="contains" sortBy="#{object.name}">
						<h:outputText value="#{object.name}" />
					</p:column>

					<p:column headerText="NRIC" filterBy="#{object.nric}"
						filterMatchMode="contains" sortBy="#{object.nric}">
						<h:outputText value="#{object.nric}" />
					</p:column>

					<p:column headerText="Mobile" filterBy="#{object.mobile}"
						filterMatchMode="contains" sortBy="#{object.mobile}">
						<h:outputText value="#{object.mobile}" />
					</p:column>
				</p:dataTable>
			</p:panel>
		</p:dialog>
	</h:form>

</ui:composition>
