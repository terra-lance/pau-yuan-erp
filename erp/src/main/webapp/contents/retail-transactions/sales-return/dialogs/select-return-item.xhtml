<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="selectReturnItemForm">
		<p:dialog value="Selection" widgetVar="selectReturnItemWV"
			resizable="false" responsive="true" modal="true">

			<p:toolbar id="toolbar">
				<f:facet name="right">
					<p:commandButton value="Select" icon="fa fa-fw fa-check"
						action="#{salesReturnController.selectReturnItem()}"
						update="@(.page)" />
				</f:facet>
			</p:toolbar>

			<p:panel styleClass="dialog" header="Select Return Item">
				<div class="grid">
					<div class="col-12 md:col-3 xl:col-3">
						<div class="grid">
							<div class="col-12 md:col-12 xl:col-12">
								<h6>Invoice No.</h6>
								<p:inputText styleClass="full-width read-only" id="documentNo"
									value="#{salesReturnController.taxInvoice.documentNo}"
									readonly="true" />

								<h6>Invoice Date</h6>
								<p:inputText styleClass="full-width read-only" id="documentDate"
									value="#{salesReturnController.taxInvoice.documentDate}"
									readonly="true">
									<f:convertDateTime
										pattern="#{salesReturnController.configuration.datePattern}" />
								</p:inputText>
							</div>
						</div>
					</div>

					<div class="col-12 md:col-3 xl:col-3">
						<div class="grid">
							<div class="col-12 md:col-12 xl:col-12">
								<h6>Customer</h6>
								<p:inputText styleClass="full-width read-only"
									value="#{salesReturnController.taxInvoice.customer.name}"
									readonly="true" />

								<h6>NRIC</h6>
								<p:inputText styleClass="full-width read-only" id="customerIC"
									value="#{salesReturnController.taxInvoice.customer.nric}"
									readonly="true" />
							</div>
						</div>
					</div>

					<div class="col-12 md:col-3 xl:col-3">
						<div class="grid">
							<div class="col-12 md:col-12 xl:col-12">
								<h6>Address</h6>
								<p:inputText styleClass="full-width read-only" id="address1"
									value="#{salesReturnController.taxInvoice.address1}"
									readonly="true" />
								<p:inputText styleClass="full-width read-only" id="address2"
									value="#{salesReturnController.taxInvoice.address2}"
									readonly="true" />
								<p:inputText styleClass="full-width read-only" id="address3"
									value="#{salesReturnController.taxInvoice.address3}"
									readonly="true" />
							</div>
						</div>
					</div>

					<div class="col-12 md:col-3 xl:col-3">
						<div class="grid">
							<div class="col-12 md:col-12 xl:col-12">
								<h6>Contact</h6>
								<p:outputPanel styleClass="ui-inputgroup">
									<p:outputPanel styleClass="ui-inputgroup-addon">
										<i class="fa fa-mobile-screen" />
									</p:outputPanel>
									<p:inputText styleClass="full-width read-only"
										id="customerMobile"
										value="#{salesReturnController.taxInvoice.customer.mobile}"
										readonly="true" />
									<p:watermark for="customerMobile" value="Mobile" />
								</p:outputPanel>

								<p:outputPanel styleClass="ui-inputgroup">
									<p:outputPanel styleClass="ui-inputgroup-addon">
										<i class="fa fa-house" />
									</p:outputPanel>
									<p:inputText styleClass="full-width read-only"
										id="customerHome"
										value="#{salesReturnController.taxInvoice.customer.home}"
										readonly="true" />
									<p:watermark for="customerHome" value="Home" />
								</p:outputPanel>

								<p:outputPanel styleClass="ui-inputgroup">
									<p:outputPanel styleClass="ui-inputgroup-addon">
										<i class="fa fa-building" />
									</p:outputPanel>
									<p:inputText styleClass="full-width read-only"
										id="customerOffice"
										value="#{salesReturnController.taxInvoice.customer.office}"
										readonly="true" />
									<p:watermark for="customerOffice" value="Office" />
								</p:outputPanel>
							</div>
						</div>
					</div>
				</div>

				<p:separator />

				<p:dataGrid id="items"
					value="#{salesReturnController.taxInvoice.orders}" var="order"
					lazy="false" columns="1">
					<div class="card">
						<div class="grid">
							<div class="col-12 md:col-3 xl:col-3">
								<p:outputPanel styleClass="ui-inputgroup">
									<p:selectBooleanCheckbox style="padding-right: 5px"
										value="#{order.returnSelected}">
										<p:ajax event="change" update=":selectReturnItemForm:items" />
									</p:selectBooleanCheckbox>
									<h6>Order</h6>
								</p:outputPanel>
								<p:inputText styleClass="full-width read-only"
									value="#{order.documentNo}" />

								<h6>Order Date</h6>
								<p:inputText styleClass="full-width read-only"
									value="#{order.documentDate}">
									<f:convertDateTime
										pattern="#{salesReturnController.configuration.datePattern}" />
								</p:inputText>
							</div>

							<div class="col-12 md:col-9 xl:col-9">
								<p:outputPanel rendered="#{!order.useOwnFrame}">
									<h6>Frame</h6>
									<p:outputPanel styleClass="ui-inputgroup">
										<p:selectBooleanCheckbox style="padding-right: 5px"
											value="#{order.frameReturnSelected}"
											disabled="#{order.returned}">
											<p:ajax event="change" update=":selectReturnItemForm:items" />
										</p:selectBooleanCheckbox>
										<p:inputText styleClass="full-width read-only"
											value="#{order.frameSummary}" readonly="true" />
									</p:outputPanel>
								</p:outputPanel>

								<p:outputPanel rendered="#{order.lenses.size() > 0}">
									<h6>Lens</h6>
									<p:dataGrid styleClass="full-width" value="#{order.lenses}"
										var="lens" lazy="false" columns="1">
										<p:outputPanel styleClass="ui-inputgroup">
											<p:selectBooleanCheckbox style="padding-right: 5px"
												value="#{lens.returnSelected}" disabled="#{lens.returned}">
												<p:ajax event="change" update=":selectReturnItemForm:items" />
											</p:selectBooleanCheckbox>
											<p:inputText styleClass="full-with read-only"
												value="#{lens.summary}" readonly="true" />
										</p:outputPanel>
									</p:dataGrid>
								</p:outputPanel>

								<p:outputPanel rendered="#{order.serviceItems.size() > 0}">
									<h6>Service Items</h6>
									<p:dataGrid styleClass="full-width"
										value="#{order.serviceItems}" var="serviceItem" lazy="false"
										columns="1">
										<p:outputPanel styleClass="ui-inputgroup">
											<p:selectBooleanCheckbox style="padding-right: 5px"
												value="#{serviceItem.returnSelected}"
												disabled="#{serviceItems.returned}">
												<p:ajax event="change" update=":selectReturnItemForm:items" />
											</p:selectBooleanCheckbox>
											<p:inputText styleClass="full-with read-only"
												value="#{serviceItem.serviceType.code}" readonly="true" />
										</p:outputPanel>
									</p:dataGrid>
								</p:outputPanel>
							</div>
						</div>
					</div>
				</p:dataGrid>
			</p:panel>
		</p:dialog>
	</h:form>

</ui:composition>
