<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:sec="http://www.springframework.org/security/tags">

	<ui:define name="title">
		<h:outputText value="#{salesReturnController.title}" />
	</ui:define>

	<ui:define name="content">
		<h:form id="indexForm" class="page">
			<p:outputPanel
				rendered="#{salesReturnController.page == salesReturnController.naviIndex}">
				<p:toolbar id="toolbar">
					<f:facet name="left">
						<h:outputText styleClass="module-name"
							value="#{salesReturnController.title}" />
					</f:facet>

					<f:facet name="right">
						<p:commandButton id="detailButton" icon="fa fa-search"
							action="#{salesReturnController.detail()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="detailButton"
							value="Record Detail" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="insertButton" icon="fa fa-plus"
							action="#{salesReturnController.insert()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="insertButton"
							value="Add Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="updateButton" icon="fa fa-edit"
							action="#{salesReturnController.update()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="updateButton"
							value="Update Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="deleteButton" icon="fa fa-trash-alt"
							action="#{salesReturnController.delete()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="deleteButton"
							value="Delete Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="cancelButton" icon="fa fa-ban"
							action="#{salesReturnController.cancel()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="cancelButton"
							value="Cancel Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="postButton" icon="fa fa-envelope"
							action="#{salesReturnController.post()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="postButton"
							value="Post Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="unpostButton" icon="fa fa-backward"
							action="#{salesReturnController.unpost()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="unpostButton"
							value="Unpost Record" position="top" hideEvent="mouseleave click" />
					</f:facet>
				</p:toolbar>
				<p:sticky target="toolbar" />

				<div class="card">
					<p:toolbar>
						<f:facet name="left">
							<span class="ui-input-icon-left"> <i class="fa fa-search" />
								<p:inputText placeholder="Search"
									value="#{salesReturnController.keyword}">
									<p:ajax event="keyup" delay="500"
										listener="#{salesReturnController.loadRecord()}"
										process="@this" update="data" />
								</p:inputText>
							</span>
						</f:facet>

						<f:facet name="right">
							<h:outputText value="Return Date : " style="margin-right: .3rem" />

							<p:calendar id="returnStartDate"
								value="#{salesReturnController.returnStartDate}"
								pattern="#{salesReturnController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{salesReturnController.loadRecord()}"
									process="@this" update="data" />
								<p:ajax event="change"
									listener="#{salesReturnController.loadRecord()}"
									process="@this" update="data" />
							</p:calendar>

							<h:outputText value="-" style="margin: 0 .3rem 0 .3rem" />

							<p:calendar id="returnEndDate"
								value="#{salesReturnController.returnEndDate}"
								pattern="#{salesReturnController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{salesReturnController.loadRecord()}"
									process="@this" update="data" />
								<p:ajax event="change"
									listener="#{salesReturnController.loadRecord()}"
									process="@this" update="data" />
							</p:calendar>
						</f:facet>
					</p:toolbar>

					<p:remoteCommand name="ajaxRefreshPage" process="@form"
						update="@(.page)" />

					<p:scrollPanel>
						<p:dataTable styleClass="table-2000px" id="data"
							rowIndexVar="rowIndex" var="object" rowKey="#{object}"
							value="#{salesReturnController.objects}"
							emptyMessage="No record(s) found" widgetVar="dataTableWV"
							paginator="true"
							paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
							rows="10" rowsPerPageTemplate="10,20,30,40,50"
							selection="#{salesReturnController.selectedObjects}" lazy="true"
							reflow="true" resizableColumns="true">

							<p:ajax event="page" delay="150" onsuccess="ajaxRefreshPage()" />

							<p:ajax event="rowDblselect"
								listener="#{salesReturnController.detail}" update="@(.page)"
								global="false" />

							<p:column styleClass="#{object.cancelled ? 'gray-box' : ''}"
								selectionMode="multiple" style="width:16px;text-align:center" />

							<p:column headerText="Date"
								styleClass="#{object.cancelled ? 'gray-box' : ''}"
								sortBy="#{object.documentDate}">
								<h:outputText value="#{object.documentDate}">
									<f:convertDateTime
										pattern="#{salesReturnController.configuration.datePattern}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Return #"
								styleClass="#{object.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.documentNo}" filterMatchMode="contains"
								sortBy="#{object.documentNo}">
								<h:outputText value="#{object.documentNo}" />
							</p:column>

							<p:column headerText="Name"
								styleClass="desktop-20vw #{object.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.customer.name}" filterMatchMode="contains"
								sortBy="#{object.customer.name}">
								<h:outputText value="#{object.customer.name}" />
							</p:column>

							<p:column headerText="NRIC"
								styleClass="#{object.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.customer.nric}" filterMatchMode="contains"
								sortBy="#{object.customer.nric}">
								<h:outputText value="#{object.customer.nric}" />
							</p:column>

							<p:column headerText="Mobile"
								styleClass="#{object.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.customer.mobile}" filterMatchMode="contains"
								sortBy="#{object.customer.mobile}">
								<h:outputText value="#{object.customer.mobile}" />
							</p:column>

							<p:column headerText="Amount"
								styleClass="align-right #{object.cancelled ? 'gray-box' : ''}">
								<h:outputText value="#{object.total}">
									<f:convertNumber
										pattern="#{salesReturnController.monetaryDecimalMask}" />
								</h:outputText>
							</p:column>
						</p:dataTable>
					</p:scrollPanel>
				</div>
			</p:outputPanel>
		</h:form>

		<ui:include
			src="/contents/retail-transactions/sales-return/detail.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-return/insert.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-return/update.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-return/delete.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-return/cancel.xhtml" />


		<ui:include
			src="/contents/retail-transactions/sales-return/dialogs/select-customer.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-return/dialogs/select-tax-invoice.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-return/dialogs/select-return-item.xhtml" />
	</ui:define>

</ui:composition>
