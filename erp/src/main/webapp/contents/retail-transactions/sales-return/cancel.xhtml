<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="cancelForm" class="page">
		<p:outputPanel
			rendered="#{salesReturnController.page == salesReturnController.naviCancel}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<div class="title">
						<h:outputText styleClass="module-name"
							value="#{salesReturnController.title} - Cancel Record" />
					</div>
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Cancel" icon="fa fa-fw fa-ban"
						action="#{salesReturnController.saveCancel()}" update="@(.page)">
						<p:confirm header="Confirmation"
							message="Do you wish to cancel the selected record?"
							icon="ui-icon-alert" />
					</p:commandButton>
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{salesReturnController.home()}" immediate="true"
						update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-3 xl:col-3">
						<div class="grid">
							<div class="col-12 md:col-12 xl:col-12">
								<h6>Return No.</h6>
								<p:inputText styleClass="full-width read-only" id="documentNo"
									value="#{salesReturnController.object.documentNo}"
									readonly="true" />

								<h6>Return Date</h6>
								<p:inputText styleClass="full-width read-only" id="documentDate"
									value="#{salesReturnController.object.documentDate}"
									readonly="true">
									<f:convertDateTime
										pattern="#{salesReturnController.configuration.datePattern}" />
								</p:inputText>
							</div>
						</div>
					</div>

					<div class="col-12 md:col-3 xl:col-3">
						<div class="grid">
							<div class="col-12 md:col-12 xl:col-12">
								<h6>Customer</h6>
								<p:inputText styleClass="full-width read-only"
									value="#{salesReturnController.object.customer.name}"
									autocomplete="off" readonly="true" />

								<h6>NRIC</h6>
								<p:inputText styleClass="full-width read-only" id="customerIC"
									value="#{salesReturnController.object.customer.nric}"
									readonly="true" />
							</div>
						</div>
					</div>

					<div class="col-12 md:col-3 xl:col-3">
						<div class="grid">
							<div class="col-12 md:col-12 xl:col-12">
								<h6>Address</h6>
								<p:inputText styleClass="full-width read-only" id="address1"
									value="#{salesReturnController.object.address1}"
									readonly="true" />
								<p:inputText styleClass="full-width read-only" id="address2"
									value="#{salesReturnController.object.address2}"
									readonly="true" />
								<p:inputText styleClass="full-width read-only" id="address3"
									value="#{salesReturnController.object.address3}"
									readonly="true" />
							</div>
						</div>
					</div>

					<div class="col-12 md:col-3 xl:col-3">
						<div class="grid">
							<div class="col-12 md:col-12 xl:col-12">
								<h6>Contact</h6>
								<p:outputPanel styleClass="ui-inputgroup">
									<p:outputPanel styleClass="ui-inputgroup-addon">
										<i class="fa fa-mobile-screen" />
									</p:outputPanel>
									<p:inputText styleClass="full-width read-only"
										id="customerMobile"
										value="#{salesReturnController.object.mobile}" readonly="true" />
									<p:watermark for="customerMobile" value="Mobile" />
								</p:outputPanel>

								<p:outputPanel styleClass="ui-inputgroup">
									<p:outputPanel styleClass="ui-inputgroup-addon">
										<i class="fa fa-house" />
									</p:outputPanel>
									<p:inputText styleClass="full-width read-only"
										id="customerHome" value="#{salesReturnController.object.home}"
										readonly="true" />
									<p:watermark for="customerHome" value="Home" />
								</p:outputPanel>

								<p:outputPanel styleClass="ui-inputgroup">
									<p:outputPanel styleClass="ui-inputgroup-addon">
										<i class="fa fa-building" />
									</p:outputPanel>
									<p:inputText styleClass="full-width read-only"
										id="customerOffice"
										value="#{salesReturnController.object.office}" readonly="true" />
									<p:watermark for="customerOffice" value="Office" />
								</p:outputPanel>
							</div>
						</div>
					</div>
				</div>

				<h6>Return Invoice</h6>
				<p:inputText styleClass="full-width read-only"
					value="#{salesReturnController.object.taxInvoice.documentNo}"
					readonly="true" />

				<p:separator />

				<h6>Return Detail</h6>

				<p:dataGrid id="items"
					value="#{salesReturnController.object.details}" var="detail"
					lazy="false" columns="1">
					<div class="card">
						<div class="grid">
							<div class="col-12 md:col-2 xl:col-2">
								<h6>Order</h6>
								<p:inputText styleClass="full-width read-only"
									value="#{detail.salesOrder.documentNo}" readonly="true" />

								<h6>Order Date</h6>
								<p:inputText styleClass="full-width read-only"
									value="#{detail.salesOrder.documentDate}">
									<f:convertDateTime
										pattern="#{salesReturnController.configuration.datePattern}" />
								</p:inputText>
							</div>

							<div class="col-12 md:col-7 xl:col-7">
								<p:outputPanel rendered="#{detail.frame}">
									<h6>Frame</h6>
									<div class="grid">
										<div class="col-12 md:col-9 xl:col-9">
											<p:inputText styleClass="full-width read-only"
												value="#{detail.salesOrder.frameSummary}" readonly="true" />
										</div>

										<div class="col-12 md:col-3 xl:col-3">
											<p:inputNumber styleClass="full-width read-only"
												value="#{detail.frameAmount}"
												decimal="#{salesReturnController.configuration.monetaryDecimal}"
												emptyValue="zero" readonly="true" />
										</div>
									</div>
								</p:outputPanel>

								<p:outputPanel rendered="#{detail.lenses.size() > 0}">
									<h6>Lens</h6>
									<p:dataGrid styleClass="full-width" value="#{detail.lenses}"
										var="lens" lazy="false" columns="1">
										<div class="grid">
											<div class="col-12 md:col-9 xl:col-9">
												<p:inputText styleClass="full-with read-only"
													value="#{lens.salesLens.summary}" readonly="true" />
											</div>

											<div class="col-12 md:col-3 xl:col-3">
												<p:inputNumber styleClass="full-width read-only"
													value="#{lens.amount}"
													decimal="#{salesReturnController.configuration.monetaryDecimal}"
													emptyValue="zero" readonly="true" />
											</div>
										</div>
									</p:dataGrid>
								</p:outputPanel>

								<p:outputPanel rendered="#{detail.serviceItems.size() > 0}">
									<h6>Service Items</h6>
									<p:dataGrid styleClass="full-width"
										value="#{detail.serviceItems}" var="serviceItem" lazy="false"
										columns="1">
										<div class="grid">
											<div class="col-12 md:col-9 xl:col-9">
												<p:inputText styleClass="full-with read-only"
													value="#{serviceItem.salesServiceItem.serviceType.code}"
													readonly="true" />
											</div>

											<div class="col-12 md:col-3 xl:col-3">
												<p:inputNumber styleClass="full-width read-only"
													value="#{serviceItem.amount}"
													decimal="#{salesReturnController.configuration.monetaryDecimal}"
													emptyValue="zero" readonly="true" />
											</div>
										</div>
									</p:dataGrid>
								</p:outputPanel>
							</div>

							<div class="col-12 md:col-3 xl:col-3">
								<div class="grid">
									<div class="col-12 md:col-4 xl:col-4">
										<h6>Sub-Total</h6>
									</div>
									<div class="col-12 md:col-8 xl:col-8">
										<p:outputPanel styleClass="ui-inputgroup">
											<p:outputPanel styleClass="ui-inputgroup-addon currency">
												<h:outputText
													value="#{salesReturnController.configuration.currencySymbol}" />
											</p:outputPanel>

											<p:inputNumber styleClass="full-width read-only"
												id="subTotal" value="#{detail.subtotal}"
												decimal="#{salesReturnController.configuration.monetaryDecimal}"
												emptyValue="zero" readonly="true" />
										</p:outputPanel>
									</div>

									<div class="col-12 md:col-4 xl:col-4">
										<h6>Discount</h6>
									</div>
									<div class="col-12 md:col-8 xl:col-8">
										<p:outputPanel styleClass="ui-inputgroup">
											<p:outputPanel styleClass="ui-inputgroup-addon currency">
												<h:outputText
													value="#{salesReturnController.configuration.currencySymbol}" />
											</p:outputPanel>

											<p:inputNumber styleClass="full-width read-only"
												id="discount" value="#{detail.discount}"
												decimal="#{salesReturnController.configuration.monetaryDecimal}"
												emptyValue="zero" readonly="true" />
										</p:outputPanel>
									</div>

									<div class="col-12 md:col-4 xl:col-4">
										<h6>Tax</h6>
									</div>
									<div class="col-12 md:col-8 xl:col-8">
										<p:outputPanel styleClass="ui-inputgroup">
											<p:inputText styleClass="full-width read-only" id="tax"
												value="#{detail.tax.code}" readonly="true" />

											<p:inputNumber styleClass="full-width read-only" id="taxRate"
												value="#{detail.taxRate}" readonly="true" />

											<p:outputPanel styleClass="ui-inputgroup-addon">
													%
											</p:outputPanel>
										</p:outputPanel>
									</div>

									<div class="col-12 md:col-4 xl:col-4">
										<h6>Tax Amount</h6>
									</div>
									<div class="col-12 md:col-8 xl:col-8">
										<p:outputPanel styleClass="ui-inputgroup">
											<p:outputPanel styleClass="ui-inputgroup-addon currency">
												<h:outputText
													value="#{salesReturnController.configuration.currencySymbol}" />
											</p:outputPanel>

											<p:inputNumber styleClass="full-width read-only"
												id="taxAmount" value="#{detail.taxAmount}"
												decimal="#{salesReturnController.configuration.monetaryDecimal}"
												emptyValue="zero" readonly="true" />
										</p:outputPanel>
									</div>

									<div class="col-12 md:col-4 xl:col-4">
										<h6>Total</h6>
									</div>
									<div class="col-12 md:col-8 xl:col-8">
										<p:outputPanel styleClass="ui-inputgroup">
											<p:outputPanel styleClass="ui-inputgroup-addon currency">
												<h:outputText
													value="#{salesReturnController.configuration.currencySymbol}" />
											</p:outputPanel>

											<p:inputNumber styleClass="full-width read-only" id="total"
												value="#{detail.total}"
												decimal="#{salesReturnController.configuration.monetaryDecimal}"
												emptyValue="zero" readonly="true" />
										</p:outputPanel>
									</div>
								</div>
							</div>
						</div>
					</div>
				</p:dataGrid>

				<p:separator />

				<div class="grid">
					<div class="col-12 md:col-9 xl:col-9" />

					<div class="col-12 md:col-3 xl:col-3">
						<div class="grid">
							<div class="col-12 md:col-4 xl:col-4">
								<h6>Grand Total</h6>
							</div>
							<div class="col-12 md:col-8 xl:col-8">
								<p:outputPanel styleClass="ui-inputgroup">
									<p:outputPanel styleClass="ui-inputgroup-addon currency">
										<h:outputText
											value="#{salesReturnController.configuration.currencySymbol}" />
									</p:outputPanel>

									<p:inputNumber styleClass="full-width read-only"
										id="grandTotal" value="#{salesReturnController.object.total}"
										decimal="#{salesReturnController.configuration.monetaryDecimal}"
										emptyValue="zero" readonly="true" />
								</p:outputPanel>
							</div>
						</div>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
