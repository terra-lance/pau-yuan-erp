<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:sec="http://www.springframework.org/security/tags">

	<ui:define name="title">
		<h:outputText value="#{salesPaymentController.title}" />
	</ui:define>

	<ui:define name="content">
		<h:form id="indexForm" class="page">
			<p:outputPanel
				rendered="#{salesPaymentController.page == salesPaymentController.naviIndex}">
				<p:toolbar id="toolbar">
					<f:facet name="left">
						<h:outputText styleClass="module-name"
							value="#{salesPaymentController.title}" />
					</f:facet>

					<f:facet name="right">
						<p:commandButton id="postButton" icon="fa fa-envelope"
							action="#{salesPaymentController.post()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="postButton"
							value="Post Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="unpostButton" icon="fa fa-backward"
							action="#{salesPaymentController.unpost()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="unpostButton"
							value="Unpost Record" position="top" hideEvent="mouseleave click" />
					</f:facet>
				</p:toolbar>
				<p:sticky target="toolbar" />

				<div class="card">
					<p:toolbar>
						<f:facet name="left">
							<span class="ui-input-icon-left"> <i class="fa fa-search" />
								<p:inputText placeholder="Search"
									value="#{salesPaymentController.keyword}">
									<p:ajax event="keyup" delay="500"
										listener="#{salesPaymentController.loadRecord()}"
										process="@this" update="data" />
								</p:inputText>
							</span>
						</f:facet>

						<f:facet name="right">
							<h:outputText value="Payment Date:" style="margin-right: .3rem" />

							<p:calendar id="paymentStartDate"
								value="#{salesPaymentController.paymentStartDate}"
								pattern="#{salesPaymentController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{salesPaymentController.loadRecord()}"
									process="@this" update="data" />
								<p:ajax event="change"
									listener="#{salesPaymentController.loadRecord()}"
									process="@this" update="data" />
							</p:calendar>

							<h:outputText value="-" style="margin: 0 .3rem 0 .3rem" />

							<p:calendar id="paymentEndDate"
								value="#{salesPaymentController.paymentEndDate}"
								pattern="#{salesPaymentController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{salesPaymentController.loadRecord()}"
									process="@this" update="data" />
								<p:ajax event="change"
									listener="#{salesPaymentController.loadRecord()}"
									process="@this" update="data" />
							</p:calendar>
						</f:facet>
					</p:toolbar>

					<p:remoteCommand name="ajaxRefreshPage" process="@form"
						update="@(.page)" />

					<p:scrollPanel>
						<p:dataTable styleClass="table-2000px" id="data"
							rowIndexVar="rowIndex" var="object" rowKey="#{object}"
							value="#{salesPaymentController.objects}"
							emptyMessage="No record(s) found" widgetVar="dataTableWV"
							paginator="true"
							paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
							rows="10" rowsPerPageTemplate="10,20,30,40,50"
							selection="#{salesPaymentController.selectedObjects}" lazy="true"
							reflow="true" resizableColumns="true">

							<p:ajax event="page" delay="150" onsuccess="ajaxRefreshPage()" />

							<p:column
								styleClass="#{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								selectionMode="multiple" style="width:16px;text-align:center" />

							<p:column headerText="Date"
								styleClass="#{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								sortBy="#{object.salesPayment.documentDate}">
								<h:outputText value="#{object.salesPayment.documentDate}">
									<f:convertDateTime
										pattern="#{salesPaymentController.configuration.datePattern}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Payment #"
								styleClass="#{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.salesPayment.documentNo}"
								filterMatchMode="contains"
								sortBy="#{object.salesPayment.documentNo}">
								<h:outputText value="#{object.salesPayment.documentNo}" />
							</p:column>

							<p:column headerText="Order #"
								styleClass="#{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.orderNo}" filterMatchMode="contains"
								sortBy="#{object.orderNo}">
								<h:outputText value="#{object.orderNo}" />
							</p:column>

							<p:column headerText="Invoice #"
								styleClass="#{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.invoiceNo}" filterMatchMode="contains"
								sortBy="#{object.invoiceNo}">
								<h:outputText value="#{object.invoiceNo}" />
							</p:column>

							<p:column headerText="Name"
								styleClass="desktop-20vw #{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.customer.name}" filterMatchMode="contains"
								sortBy="#{object.customer.name}">
								<h:outputText value="#{object.customer.name}" />
							</p:column>

							<p:column headerText="NRIC"
								styleClass="#{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.customer.nric}" filterMatchMode="contains"
								sortBy="#{object.customer.nric}">
								<h:outputText value="#{object.customer.nric}" />
							</p:column>

							<p:column headerText="Mobile"
								styleClass="#{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.customer.mobile}" filterMatchMode="contains"
								sortBy="#{object.customer.mobile}">
								<h:outputText value="#{object.customer.mobile}" />
							</p:column>

							<p:column headerText="Method"
								styleClass="#{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.salesPayment.method.code}"
								filterMatchMode="contains"
								sortBy="#{object.salesPayment.method.code}">
								<h:outputText value="#{object.salesPayment.method.code}" />
							</p:column>

							<p:column headerText="Note"
								styleClass="#{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.salesPayment.remark}"
								filterMatchMode="contains"
								sortBy="#{object.salesPayment.remark}">
								<h:outputText value="#{object.salesPayment.remark}" />
							</p:column>

							<p:column headerText="Amount"
								styleClass="align-right #{object.salesPayment.inconsistent ? 'yellow-box' : ''}">
								<h:outputText value="#{object.salesPayment.amount}">
									<f:convertNumber
										pattern="#{salesPaymentController.monetaryDecimalMask}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Status"
								styleClass="#{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.salesPayment.status}"
								filterMatchMode="contains"
								sortBy="#{object.salesPayment.status}">
								<f:facet name="filter">
									<p:selectOneMenu styleClass="full-width"
										onchange="PF('dataTableWV').filter()" autoWidth="false">
										<f:converter converterId="salesPaymentStatusConverter" />
										<f:selectItem itemLabel="All" itemValue="#{null}" />
										<f:selectItems value="#{salesPaymentController.statuses}"
											var="status" itemLabel="#{status.description}"
											itemValue="#{status}" />
									</p:selectOneMenu>
								</f:facet>

								<h:outputText value="#{object.salesPayment.status.description}" />
							</p:column>

							<p:column headerText="Posted"
								styleClass="double-action-cell #{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.salesPayment.posted}"
								filterMatchMode="equals" sortBy="#{object.salesPayment.posted}">
								<f:facet name="filter">
									<p:triStateCheckbox
										converter="triStateCheckboxBooleanConverter"
										onchange="PF('dataTableWV').filter()" />
								</f:facet>
								<p:selectBooleanCheckbox value="#{object.salesPayment.posted}"
									disabled="true" />
							</p:column>

							<p:column headerText="Inconsistent"
								styleClass="triple-action-cell #{object.salesPayment.inconsistent ? 'yellow-box' : ''}"
								filterBy="#{object.salesPayment.inconsistent}"
								filterMatchMode="equals"
								sortBy="#{object.salesPayment.inconsistent}">
								<f:facet name="filter">
									<p:triStateCheckbox
										converter="triStateCheckboxBooleanConverter"
										onchange="PF('dataTableWV').filter()" />
								</f:facet>
								<p:selectBooleanCheckbox
									value="#{object.salesPayment.inconsistent}" disabled="true" />
							</p:column>
						</p:dataTable>
					</p:scrollPanel>
				</div>
			</p:outputPanel>
		</h:form>
	</ui:define>

</ui:composition>
