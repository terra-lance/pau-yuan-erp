<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:sec="http://www.springframework.org/security/tags">

	<ui:define name="title">
		<h:outputText value="#{salesOrderController.title}" />
	</ui:define>

	<ui:define name="content">
		<h:form id="indexForm" class="page">
			<p:outputPanel
				rendered="#{salesOrderController.page == salesOrderController.naviIndex}">
				<p:toolbar id="toolbar">
					<f:facet name="left">
						<h:outputText styleClass="module-name"
							value="#{salesOrderController.title}" />
					</f:facet>

					<f:facet name="right">
						<p:commandButton id="detailButton" icon="fa fa-search"
							action="#{salesOrderController.detail()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="detailButton"
							value="Record Detail" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="insertButton" icon="fa fa-plus"
							action="#{salesOrderController.insert()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="insertButton"
							value="Add Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="updateButton" icon="fa fa-edit"
							action="#{salesOrderController.update()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="updateButton"
							value="Update Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="invoiceButton"
							icon="fa fa-file-invoice-dollar"
							action="#{salesOrderController.invoice()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="invoiceButton"
							value="Invoice / Combine Receipt" position="top"
							hideEvent="mouseleave click" />

						<p:commandButton id="deleteButton" icon="fa fa-trash-alt"
							action="#{salesOrderController.delete()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="deleteButton"
							value="Delete Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="cancelButton" icon="fa fa-ban"
							action="#{salesOrderController.cancel()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="cancelButton"
							value="Cancel Record" position="top" hideEvent="mouseleave click" />
					</f:facet>
				</p:toolbar>
				<p:sticky target="toolbar" />

				<div class="card">
					<p:toolbar>
						<f:facet name="left">
							<span class="ui-input-icon-left"> <i class="fa fa-search" />
								<p:inputText placeholder="Search"
									value="#{salesOrderController.keyword}">
									<p:ajax event="keyup" delay="500"
										listener="#{salesOrderController.loadRecord()}"
										process="@this" update="data" />
								</p:inputText>
							</span>
						</f:facet>

						<f:facet name="right">
							<h:outputText value="Order Date : " style="margin-right: .3rem" />

							<p:calendar id="orderStartDate"
								value="#{salesOrderController.orderStartDate}"
								pattern="#{salesOrderController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{salesOrderController.loadRecord()}" process="@this"
									update="data" />
								<p:ajax event="change"
									listener="#{salesOrderController.loadRecord()}" process="@this"
									update="data" />
							</p:calendar>

							<h:outputText value="-" style="margin: 0 .3rem 0 .3rem" />

							<p:calendar id="orderEndDate"
								value="#{salesOrderController.orderEndDate}"
								pattern="#{salesOrderController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{salesOrderController.loadRecord()}" process="@this"
									update="data" />
								<p:ajax event="change"
									listener="#{salesOrderController.loadRecord()}" process="@this"
									update="data" />
							</p:calendar>
						</f:facet>
					</p:toolbar>

					<p:toolbar>
						<f:facet name="right">
							<h:outputText value="Invoice Date : " style="margin-right: .3rem" />

							<p:calendar id="invoiceStartDate"
								value="#{salesOrderController.invoiceStartDate}"
								pattern="#{salesOrderController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{salesOrderController.loadRecord()}" process="@this"
									update="data" />
								<p:ajax event="change"
									listener="#{salesOrderController.loadRecord()}" process="@this"
									update="data" />
							</p:calendar>

							<h:outputText value="-" style="margin: 0 .3rem 0 .3rem" />

							<p:calendar id="invoiceEndDate"
								value="#{salesOrderController.invoiceEndDate}"
								pattern="#{salesOrderController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{salesOrderController.loadRecord()}" process="@this"
									update="data" />
								<p:ajax event="change"
									listener="#{salesOrderController.loadRecord()}" process="@this"
									update="data" />
							</p:calendar>
						</f:facet>
					</p:toolbar>

					<p:remoteCommand name="ajaxRefreshPage" process="@form"
						update="@(.page)" />

					<p:scrollPanel>
						<p:dataTable styleClass="table-2000px" id="data"
							rowIndexVar="rowIndex" var="object" rowKey="#{object}"
							value="#{salesOrderController.objects}"
							emptyMessage="No record(s) found" widgetVar="dataTableWV"
							paginator="true"
							paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
							rows="10" rowsPerPageTemplate="10,20,30,40,50"
							selection="#{salesOrderController.selectedObjects}" lazy="true"
							reflow="true" resizableColumns="true">

							<p:ajax event="page" delay="150" onsuccess="ajaxRefreshPage()" />

							<p:ajax event="rowDblselect"
								listener="#{salesOrderController.detail}" update="@(.page)"
								global="false" />

							<p:column
								styleClass="#{object.salesOrder.cancelled ? 'gray-box' : ''}"
								selectionMode="multiple" style="width:16px;text-align:center" />

							<p:column headerText="Date"
								styleClass="#{object.salesOrder.cancelled ? 'gray-box' : ''}"
								sortBy="#{object.salesOrder.documentDate}">
								<h:outputText value="#{object.salesOrder.documentDate}">
									<f:convertDateTime
										pattern="#{salesOrderController.configuration.datePattern}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Reference"
								styleClass="#{object.salesOrder.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.salesOrder.documentNo}"
								filterMatchMode="contains"
								sortBy="#{object.salesOrder.documentNo}">
								<h:outputText value="#{object.salesOrder.documentNo}" />
							</p:column>

							<p:column headerText="Invoice Date"
								styleClass="#{object.salesOrder.cancelled ? 'gray-box' : ''}"
								sortBy="#{object.invoiceDate}">
								<h:outputText value="#{object.invoiceDate}">
									<f:convertDateTime
										pattern="#{salesOrderController.configuration.datePattern}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Invoice"
								styleClass="#{object.salesOrder.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.invoiceNo}" filterMatchMode="contains"
								sortBy="#{object.invoiceNo}">
								<h:outputText value="#{object.invoiceNo}" />
							</p:column>

							<p:column headerText="Name"
								styleClass="desktop-20vw #{object.salesOrder.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.salesOrder.customer.name}"
								filterMatchMode="contains"
								sortBy="#{object.salesOrder.customer.name}">
								<h:outputText value="#{object.salesOrder.customer.name}" />
							</p:column>

							<p:column headerText="NRIC"
								styleClass="#{object.salesOrder.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.salesOrder.customer.nric}"
								filterMatchMode="contains"
								sortBy="#{object.salesOrder.customer.nric}">
								<h:outputText value="#{object.salesOrder.customer.nric}" />
							</p:column>

							<p:column headerText="Mobile"
								styleClass="#{object.salesOrder.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.salesOrder.customer.mobile}"
								filterMatchMode="contains"
								sortBy="#{object.salesOrder.customer.mobile}">
								<h:outputText value="#{object.salesOrder.customer.mobile}" />
							</p:column>

							<p:column headerText="Frame Brand"
								styleClass="#{object.salesOrder.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.salesOrder.frameInventory.purchaseOrderFrame.frame.brand.code}"
								filterMatchMode="contains"
								sortBy="#{object.salesOrder.frameInventory.purchaseOrderFrame.frame.brand.code}">
								<h:outputText
									value="#{object.salesOrder.frameInventory.purchaseOrderFrame.frame.brand.code}" />
							</p:column>

							<p:column headerText="Frame Model"
								styleClass="#{object.salesOrder.cancelled ? 'gray-box' : ''}"
								filterBy="#{object.salesOrder.frameInventory.purchaseOrderFrame.frame.code}"
								filterMatchMode="contains"
								sortBy="#{object.salesOrder.frameInventory.purchaseOrderFrame.frame.code}">
								<h:outputText
									value="#{object.salesOrder.frameInventory.purchaseOrderFrame.frame.code}" />
							</p:column>

							<p:column headerText="Amount"
								styleClass="align-right #{object.salesOrder.cancelled ? 'gray-box' : ''}">
								<h:outputText value="#{object.salesOrder.total}">
									<f:convertNumber
										pattern="#{salesOrderController.monetaryDecimalMask}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Balance"
								styleClass="align-right #{object.salesOrder.cancelled ? 'gray-box' : ''}">
								<h:outputText value="#{object.salesOrder.balance}">
									<f:convertNumber
										pattern="#{salesOrderController.monetaryDecimalMask}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Collection"
								styleClass="#{object.salesOrder.cancelled ? 'gray-box' : ''}"
								sortBy="#{object.salesOrder.collectionDate}">
								<h:outputText value="#{object.salesOrder.collectionDate}">
									<f:convertDateTime
										pattern="#{salesOrderController.configuration.datePattern}" />
								</h:outputText>
							</p:column>
						</p:dataTable>
					</p:scrollPanel>
				</div>
			</p:outputPanel>
		</h:form>

		<ui:include
			src="/contents/retail-transactions/sales-order/detail.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/insert.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/update.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/cancel.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/delete.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/invoice.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/select-customer.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/select-sales-person.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/select-examiner.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/select-inspection.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/select-lens.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/update-lens.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/update-frame.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/insert-payment.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/confirm-invoice.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/select-invoice-customer.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/select-invoice-order.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/print-combined-invoice.xhtml" />

		<ui:include
			src="/contents/retail-transactions/sales-order/dialogs/print-combined-receipt.xhtml" />
	</ui:define>

</ui:composition>
