<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="cancelForm" class="page">
		<p:outputPanel
			rendered="#{salesOrderController.page == salesOrderController.naviCancel}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<div class="title">
						<h:outputText styleClass="module-name"
							value="#{salesOrderController.title} - Cancel Record" />
					</div>
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Cancel Order" icon="fa fa-fw fa-ban"
						action="#{salesOrderController.saveCancel()}" update="@(.page)">
						<p:confirm header="Confirmation"
							message="Do you wish to cancel the selected record?"
							icon="ui-icon-alert" />
					</p:commandButton>
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{salesOrderController.home()}" immediate="true"
						update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-9 xl:col-9">
						<p:panel>
							<div class="grid">
								<div class="col-12 md:col-3 xl:col-3">
									<div class="grid">
										<div class="col-12 md:col-12 xl:col-12">
											<h6>Reference No.</h6>
											<p:outputPanel styleClass="ui-inputgroup">
												<p:inputText styleClass="full-width read-only"
													id="documentNo"
													value="#{salesOrderController.object.documentNo}"
													readonly="true" />
											</p:outputPanel>

											<h6>Document Date</h6>
											<p:inputText styleClass="full-width read-only"
												id="documentDate"
												value="#{salesOrderController.object.documentDate}"
												readonly="true">
												<f:convertDateTime
													pattern="#{salesOrderController.configuration.datePattern}" />
											</p:inputText>
										</div>
									</div>
								</div>

								<div class="col-12 md:col-3 xl:col-3">
									<div class="grid">
										<div class="col-12 md:col-12 xl:col-12">
											<h6>Customer</h6>
											<p:inputText styleClass="full-width read-only"
												value="#{salesOrderController.object.customer.name}"
												readonly="true" />

											<h6>NRIC</h6>
											<p:inputText styleClass="full-width read-only"
												id="customerIC"
												value="#{salesOrderController.object.customer.nric}"
												readonly="true" />
										</div>
									</div>
								</div>

								<div class="col-12 md:col-3 xl:col-3">
									<div class="grid">
										<div class="col-12 md:col-12 xl:col-12">
											<h6>Address</h6>
											<p:inputText styleClass="full-width read-only" id="address1"
												value="#{salesOrderController.object.address1}"
												readonly="true" />
											<p:inputText styleClass="full-width read-only" id="address2"
												value="#{salesOrderController.object.address2}"
												readonly="true" />
											<p:inputText styleClass="full-width read-only" id="address3"
												value="#{salesOrderController.object.address3}"
												readonly="true" />
										</div>
									</div>
								</div>

								<div class="col-12 md:col-3 xl:col-3">
									<div class="grid">
										<div class="col-12 md:col-12 xl:col-12">
											<h6>Contact</h6>
											<p:outputPanel styleClass="ui-inputgroup">
												<p:outputPanel styleClass="ui-inputgroup-addon">
													<i class="fa fa-mobile-screen" />
												</p:outputPanel>
												<p:inputText styleClass="full-width read-only"
													id="customerMobile"
													value="#{salesOrderController.object.customer.mobile}"
													readonly="true" />
												<p:watermark for="customerMobile" value="Mobile" />
											</p:outputPanel>

											<p:outputPanel styleClass="ui-inputgroup">
												<p:outputPanel styleClass="ui-inputgroup-addon">
													<i class="fa fa-house" />
												</p:outputPanel>
												<p:inputText styleClass="full-width read-only"
													id="customerHome"
													value="#{salesOrderController.object.customer.home}"
													readonly="true" />
												<p:watermark for="customerHome" value="Home" />
											</p:outputPanel>

											<p:outputPanel styleClass="ui-inputgroup">
												<p:outputPanel styleClass="ui-inputgroup-addon">
													<i class="fa fa-building" />
												</p:outputPanel>
												<p:inputText styleClass="full-width read-only"
													id="customerOffice"
													value="#{salesOrderController.object.customer.office}"
													readonly="true" />
												<p:watermark for="customerOffice" value="Office" />
											</p:outputPanel>
										</div>
									</div>
								</div>
							</div>
						</p:panel>

						<p:toolbar>
							<f:facet name="left">
								<p:selectOneButton value="#{salesOrderController.tabIndex}">
									<f:selectItem itemValue="0" itemLabel="1.) Order/Prescription" />
									<f:selectItem itemValue="1" itemLabel="2.) Payment" />

									<p:ajax event="change" process="@form" update="tab" />
								</p:selectOneButton>
							</f:facet>
						</p:toolbar>

						<p:outputPanel id="tab">
							<p:outputPanel id="prescriptionPanel"
								styleClass="#{salesOrderController.tabIndex == salesOrderController.tabPrescription ? '' : 'invisible'}">
								<p:panel>
									<div class="grid">
										<div class="col-12 md:col-12 xl:col-12">
											<h6>Examiner</h6>
											<p:inputText styleClass="full-width read-only"
												value="#{salesOrderController.object.examiner.name}"
												readonly="true" />
										</div>

										<div class="col-12 md:col-8 xl:col-8">
											<p:outputPanel styleClass="ui-inputgroup border">
												<p:outputPanel styleClass="ui-inputgroup-addon" />

												<p:inputText styleClass="full-width lightcoral-box"
													style="border-right: 1px solid silver; font-size:12px"
													value="SPH" disabled="true" />
												<p:inputText styleClass="full-width lightcoral-box"
													style="border-right: 1px solid silver; font-size:12px"
													value="CYL" disabled="true" />
												<p:inputText styleClass="full-width lightcoral-box"
													style="border-right: 1px solid silver; font-size:12px"
													value="AXIS" disabled="true" />
												<p:inputText styleClass="full-width lightcoral-box"
													style="border-right: 1px solid silver; font-size:12px"
													value="ADD" disabled="true" />
												<p:inputText styleClass="full-width lightcoral-box"
													style="border-right: 1px solid silver; font-size:12px"
													value="PRISM" disabled="true" />
												<p:inputText styleClass="full-width lightcoral-box"
													style="border-right: 1px solid silver; font-size:12px"
													value="DEC(MN)" disabled="true" />
												<p:inputText styleClass="full-width lightcoral-box"
													style="border-right: 1px solid silver; font-size:12px"
													value="VA" disabled="true" />
												<p:inputText styleClass="full-width lightcoral-box"
													style="font-size:12px" value="AXL" disabled="true" />
											</p:outputPanel>

											<p:outputPanel styleClass="ui-inputgroup border">
												<p:outputPanel styleClass="ui-inputgroup-addon">RE</p:outputPanel>

												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver" id="rightSphere"
													value="#{salesOrderController.object.rightSphere}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver" id="rightCylinder"
													value="#{salesOrderController.object.rightCylinder}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver" id="rightAxis"
													value="#{salesOrderController.object.rightAxis}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver" id="rightAdditional"
													value="#{salesOrderController.object.rightAdditional}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver" id="rightPrism"
													value="#{salesOrderController.object.rightPrism}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver"
													id="rightDecentration"
													value="#{salesOrderController.object.rightDecentration}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver"
													id="rightVisualAcuity"
													value="#{salesOrderController.object.rightVisualAcuity}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													id="rightAxialLength"
													value="#{salesOrderController.object.rightAxialLength}"
													readonly="true" />
											</p:outputPanel>

											<p:outputPanel styleClass="ui-inputgroup border">
												<p:outputPanel styleClass="ui-inputgroup-addon">LE</p:outputPanel>

												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver" id="leftSphere"
													value="#{salesOrderController.object.leftSphere}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver" id="leftCylinder"
													value="#{salesOrderController.object.leftCylinder}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver" id="leftAxis"
													value="#{salesOrderController.object.leftAxis}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver" id="leftAdditional"
													value="#{salesOrderController.object.leftAdditional}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver" id="leftPrism"
													value="#{salesOrderController.object.leftPrism}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver"
													id="leftDecentration"
													value="#{salesOrderController.object.leftDecentration}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													style="border-right: 1px solid silver"
													id="leftVisualAcuity"
													value="#{salesOrderController.object.leftVisualAcuity}"
													readonly="true" />
												<p:inputText styleClass="full-width align-right read-only"
													id="leftAxialLength"
													value="#{salesOrderController.object.leftAxialLength}"
													readonly="true" />
											</p:outputPanel>
										</div>

										<div class="col-12 md:col-4 xl:col-4">
											<p:outputPanel styleClass="ui-inputgroup border">
												<p:outputPanel styleClass="ui-inputgroup-addon x2">

												</p:outputPanel>

												<p:inputText styleClass="full-width read-only"
													style="background-color: sandybrown !important;color: white !important;border-right: 1px solid silver"
													value="PD(d)" readonly="true" />
												<p:inputText styleClass="full-width read-only"
													style="background-color: sandybrown !important;color: white !important;border-right: 1px solid silver"
													value="PD(n)" readonly="true" />
												<p:inputText styleClass="full-width read-only"
													style="background-color: sandybrown !important;color: white !important"
													value="HT" readonly="true" />
											</p:outputPanel>

											<p:outputPanel styleClass="ui-inputgroup border">
												<p:outputPanel styleClass="ui-inputgroup-addon x2">BOTH</p:outputPanel>

												<p:inputNumber styleClass="full-width read-only"
													style="border-right: 1px solid silver" id="bothPdd"
													value="#{salesOrderController.object.bothPdd}"
													decimalPlaces="1" emptyValue="zero" readonly="true" />
												<p:inputNumber styleClass="full-width read-only"
													style="border-right: 1px solid silver" id="bothPdn"
													value="#{salesOrderController.object.bothPdn}"
													decimalPlaces="1" emptyValue="zero" readonly="true" />
												<p:inputNumber styleClass="full-width read-only" id="bothHt"
													value="#{salesOrderController.object.bothHt}"
													decimalPlaces="1" emptyValue="zero" readonly="true" />
											</p:outputPanel>

											<p:outputPanel styleClass="ui-inputgroup border">
												<p:outputPanel styleClass="ui-inputgroup-addon x2">RE</p:outputPanel>

												<p:inputNumber styleClass="full-width read-only"
													style="border-right: 1px solid silver" id="rightPdd"
													value="#{salesOrderController.object.rightPdd}"
													decimalPlaces="1" emptyValue="zero" readonly="true" />
												<p:inputNumber styleClass="full-width read-only"
													style="border-right: 1px solid silver" id="rightPdn"
													value="#{salesOrderController.object.rightPdn}"
													decimalPlaces="1" emptyValue="zero" readonly="true" />
												<p:inputNumber styleClass="full-width read-only"
													id="rightHt" value="#{salesOrderController.object.rightHt}"
													decimalPlaces="1" emptyValue="zero" readonly="true" />
											</p:outputPanel>

											<p:outputPanel styleClass="ui-inputgroup border">
												<p:outputPanel styleClass="ui-inputgroup-addon x2">LE</p:outputPanel>

												<p:inputNumber styleClass="full-width read-only"
													style="border-right: 1px solid silver" id="leftPdd"
													value="#{salesOrderController.object.leftPdd}"
													decimalPlaces="1" emptyValue="zero" readonly="true" />
												<p:inputNumber styleClass="full-width read-only"
													style="border-right: 1px solid silver" id="leftPdn"
													value="#{salesOrderController.object.leftPdn}"
													decimalPlaces="1" emptyValue="zero" readonly="true" />
												<p:inputNumber styleClass="full-width read-only" id="leftHt"
													value="#{salesOrderController.object.leftHt}"
													decimalPlaces="1" emptyValue="zero" readonly="true" />
											</p:outputPanel>
										</div>

										<div class="col-12 md:col-12 xl:col-12">
											<p:inputTextarea styleClass="full-width read-only"
												id="prescriptionRemark"
												value="#{salesOrderController.object.prescriptionRemark}"
												readonly="true" />
											<p:watermark for="prescriptionRemark"
												value="Prescription Note" />
										</div>
									</div>
								</p:panel>

								<p:panel>
									<div class="grid">
										<div class="col-12 md:col-12 xl:col-12">
											<h6>Lens Order</h6>
											<p:panel>
												<p:dataTable styleClass="no-border" id="salesLenses"
													value="#{salesOrderController.object.listLenses}"
													rowIndexVar="rowIndex" var="lens" rowKey="#{lens}"
													emptyMessage="No lens ordered">
													<p:column headerText="No." styleClass="index-cell">
														<h:outputText value="#{rowIndex + 1}" />
													</p:column>

													<p:column headerText="Lens">
														<h:outputText value="#{lens.summary}" />
													</p:column>

													<p:column headerText="Price"
														styleClass="triple-action-cell align-right">
														<h:outputText value="#{lens.price}">
															<f:convertNumber
																pattern="#{salesOrderController.monetaryDecimalMask}" />
														</h:outputText>
													</p:column>
												</p:dataTable>
											</p:panel>
										</div>

										<div class="col-12 md:col-12 xl:col-12">
											<h6>Frame Order</h6>
											<p:panel id="frame">
												<div class="grid">
													<div class="col-12 md:col-9 xl:col-9">
														<h6>Frame</h6>
														<p:inputText styleClass="full-width read-only"
															id="frameSummary"
															value="#{salesOrderController.object.frameSummary}"
															readonly="true" />
														<p:watermark for="frameSummary" value="No frame ordered" />
													</div>

													<div class="col-12 md:col-3 xl:col-3">
														<h6>Price</h6>
														<p:inputNumber styleClass="full-width read-only"
															value="#{salesOrderController.object.framePrice}"
															decimalPlaces="#{salesOrderController.configuration.monetaryDecimal}"
															readonly="true" />
													</div>
												</div>
											</p:panel>
										</div>

										<div class="col-12 md:col-12 xl:col-12">
											<h6>Service Order</h6>
											<p:panel>
												<p:dataTable id="salesServiceItems"
													value="#{salesOrderController.object.listServiceItems}"
													rowIndexVar="rowIndex" var="serviceItem"
													rowKey="#{serviceItem}" emptyMessage="No services ordered">
													<p:column headerText="No." styleClass="index-cell">
														<h:outputText value="#{rowIndex + 1}" />
													</p:column>

													<p:column headerText="Service">
														<h:outputText value="#{serviceItem.serviceType.name}" />
													</p:column>

													<p:column headerText="Remark">
														<h:outputText value="#{serviceItem.remark}" />
													</p:column>

													<p:column headerText="Price"
														styleClass="triple-action-cell align-right">
														<h:outputText value="#{serviceItem.price}">
															<f:convertNumber
																pattern="#{salesOrderController.monetaryDecimalMask}" />
														</h:outputText>
													</p:column>
												</p:dataTable>
											</p:panel>
										</div>
									</div>
								</p:panel>
							</p:outputPanel>

							<p:outputPanel id="paymentPanel"
								styleClass="#{salesOrderController.tabIndex == salesOrderController.tabPayment ? '' : 'invisible'}">
								<p:panel>
									<div class="grid">
										<div class="col-12 md:col-8 xl:col-8">
											<br />
											<p:dataTable id="paymentTable" styleClass="data-table"
												rowIndexVar="rowIndex" rowKey="#{payment}" var="payment"
												value="#{salesOrderController.object.sortedListPayments}"
												reflow="true">

												<p:column headerText="Date" styleClass="double-action-cell">
													<h:outputText value="#{payment.documentDate}">
														<f:convertDateTime
															pattern="#{salesOrderController.configuration.timestampPattern}" />
													</h:outputText>
												</p:column>

												<p:column headerText="Method">
													<h:outputText value="#{payment.method.code}" />
												</p:column>

												<p:column headerText="Note">
													<h:outputText styleClass="multi-line"
														value="#{payment.remark}" />
												</p:column>

												<p:column headerText="Amount"
													styleClass="double-action-cell">
													<h:outputText value="#{payment.amount}">
														<f:convertNumber
															pattern="#{salesOrderController.monetaryDecimalMask}" />
													</h:outputText>
												</p:column>

												<p:column headerText="Status">
													<h:outputText value="#{payment.status.description}" />
												</p:column>
											</p:dataTable>
										</div>

										<div class="col-12 md:col-4 xl:col-4">
											<p:outputPanel>
												<h6>Print</h6>

												<div class="grid">
													<div class="col-12 md:col-8 xl:col-8">
														<p:commandButton styleClass="full-width"
															style="margin-bottom:.1rem" value="Deposit Slip" />

														<p:commandButton styleClass="full-width"
															style="margin-bottom:.1rem" value="Reference" />

														<p:commandButton styleClass="full-width"
															style="margin-bottom:.1rem" value="Lab Copy" />
													</div>

													<div class="col-12 md:col-4 xl:col-4">
														<p:commandButton styleClass="full-width"
															style="height: 100%" value="Print All" />
													</div>
												</div>

												<div class="grid">
													<div class="col-12 md:col-12 xl:col-12">
														<p:commandButton styleClass="full-width"
															style="margin-bottom:.1rem" value="Tax Invoice (Company)" />

														<p:commandButton styleClass="full-width"
															style="margin-bottom:.1rem"
															value="Tax Invoice (Customer)" />

														<p:commandButton styleClass="full-width"
															style="margin-bottom:.1rem" value="Updated Payment" />
													</div>
												</div>
											</p:outputPanel>
										</div>
									</div>
								</p:panel>
							</p:outputPanel>
						</p:outputPanel>
					</div>

					<div class="col-12 md:col-3 xl:col-3">
						<p:panel id="summaryPanel">
							<div class="grid">
								<div class="col-12 md:col-12 xl:col-12">
									<h6>Staff</h6>
									<p:inputText styleClass="full-width read-only"
										value="#{salesOrderController.object.salesPerson.name}"
										readonly="true" />

									<h6>Collection Date</h6>
									<p:inputText styleClass="full-width read-only"
										id="collectionDate"
										value="#{salesOrderController.object.collectionDate}">
										<f:convertDateTime
											pattern="#{salesOrderController.configuration.datePattern}" />
									</p:inputText>

									<h6>Tax Invoice</h6>
									<p:outputPanel styleClass="ui-inputgroup">
										<p:outputPanel styleClass="ui-inputgroup-addon">
											<i class="fa fa-hashtag" />
										</p:outputPanel>
										<p:inputText styleClass="full-width read-only" id="invoiceNo"
											value="#{salesOrderController.object.taxInvoice.documentNo}"
											readonly="true" />
										<p:watermark for="invoiceNo" value="Invoice No." />
									</p:outputPanel>

									<p:outputPanel styleClass="ui-inputgroup">
										<p:outputPanel styleClass="ui-inputgroup-addon">
											<i class="fa fa-calendar-days" />
										</p:outputPanel>
										<p:inputText styleClass="full-width read-only"
											id="invoiceDate"
											value="#{salesOrderController.object.taxInvoice.documentDate}"
											readonly="true">
											<f:convertDateTime type="date"
												pattern="#{salesOrderController.configuration.datePattern}" />
										</p:inputText>
										<p:watermark for="invoiceDate" value="Invoice Date" />
									</p:outputPanel>

									<p:outputPanel styleClass="ui-inputgroup">
										<p:outputPanel styleClass="ui-inputgroup-addon">
											<i class="fa fa-person" />
										</p:outputPanel>
										<p:inputText styleClass="full-width read-only"
											id="invoiceName"
											value="#{salesOrderController.object.taxInvoice.customer.name}"
											readonly="true" />
										<p:watermark for="invoiceName" value="Invoice Customer" />
