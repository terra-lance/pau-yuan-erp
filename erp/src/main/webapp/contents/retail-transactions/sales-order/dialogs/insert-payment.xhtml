<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="insertPaymentForm">
		<p:dialog value="Selection" widgetVar="insertPaymentWV"
			resizable="false" responsive="true" modal="true">

			<p:toolbar id="toolbar">
				<f:facet name="right">
					<p:commandButton value="Save" icon="fa fa-fw fa-check"
						action="#{salesOrderController.savePayment()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>

			<p:panel styleClass="dialog" header="Make Payment">
				<div class="grid">
					<div class="col-12 md:col-12 xl:col-12">
						<h6>Status</h6>
						<p:inputText styleClass="full-width read-only"
							value="#{salesOrderController.payment.status.description}"
							readonly="true" />

						<h6>Payment Date</h6>
						<p:inputText styleClass="full-width read-only"
							value="#{salesOrderController.payment.documentDate}"
							readonly="true"
							rendered="#{salesOrderController.payment.id == 0}">
							<f:convertDateTime
								pattern="#{salesOrderController.configuration.timestampPattern}" />
						</p:inputText>

						<p:calendar styleClass="full-width"
							value="#{salesOrderController.payment.documentDate}"
							pattern="#{salesOrderController.configuration.timestampPattern}"
							rendered="#{salesOrderController.payment.id != 0}" />

						<h6>Payment Method</h6>
						<p:selectOneMenu styleClass="full-width"
							value="#{salesOrderController.payment.method}"
							converter="paymentMethodConverter" autoWidth="false">
							<f:selectItem itemLabel="Select" itemValue="#{null}" />
							<f:selectItems value="#{salesOrderController.paymentMethods}"
								var="method" itemLabel="#{method.code}" itemValue="#{method}" />
						</p:selectOneMenu>

						<h6>Note</h6>
						<p:inputText styleClass="full-width"
							value="#{salesOrderController.payment.remark}" autocomplete="off" />

						<h6>Amount</h6>
						<p:inputNumber styleClass="full-width"
							value="#{salesOrderController.payment.amount}" minValue="0"
							decimalPlaces="#{salesOrderController.configuration.monetaryDecimal}"
							emptyValue="zero" autocomplete="off" />
					</div>
				</div>
			</p:panel>
		</p:dialog>
	</h:form>

</ui:composition>
