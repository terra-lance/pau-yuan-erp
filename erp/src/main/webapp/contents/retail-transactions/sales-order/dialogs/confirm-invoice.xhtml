<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="confirmInvoiceForm">
		<p:dialog header="Confirmation" widgetVar="confirmInvoiceWV"
			resizable="false" responsive="true" modal="true" closable="false">

			<div class="grid">
				<div class="col-12 md:col-12 xl:col-12">
					<h:outputText
						value="This order has been fully paid, do you wish to generate tax invoice? (Do not generate if you wish to combine receipt or bill under another person name)" />
				</div>

				<div class="col-12 md:col-12 xl:col-12">
					<p:commandButton styleClass="full-width"
						style="background-color: limegreen" value="Generate Tax Invoice"
						actionListener="#{salesOrderController.generateInvoice()}"
						update="@(.page)" />
					<br />
				</div>

				<div class="col-12 md:col-12 xl:col-12">
					<p:commandButton styleClass="full-width"
						style="background-color: red"
						value="Close without Generate Tax Invoice"
						onclick="PF('confirmInvoiceWV').hide()" immediate="true" />
				</div>
			</div>
		</p:dialog>
	</h:form>

</ui:composition>
