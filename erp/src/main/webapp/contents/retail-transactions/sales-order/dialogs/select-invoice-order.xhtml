<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="selectInvoiceOrderForm">
		<p:dialog value="Selection" widgetVar="selectInvoiceOrderWV"
			resizable="false" responsive="true" modal="true">
			<p:toolbar id="toolbar">
				<f:facet name="right">
					<p:commandButton value="Select" icon="fa fa-fw fa-check"
						action="#{salesOrderController.selectInvoiceOrder()}"
						update="@(.page)" />
				</f:facet>
			</p:toolbar>

			<p:panel styleClass="dialog" header="Select Order">
				<p:dataTable styleClass="data-table" rowIndexVar="rowIndex"
					var="object" rowKey="#{object}"
					value="#{salesOrderController.invoiceOrders}" paginator="true"
					paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
					rows="10" rowsPerPageTemplate="10,20,30,40,50"
					selection="#{salesOrderController.selectedInvoiceOrders}"
					rowSelectMode="none" lazy="true">

					<p:column selectionMode="multiple"
						style="width:16px;text-align:center" />

					<p:column headerText="Reference #"
						filterBy="#{object.salesOrder.documentNo}"
						filterMatchMode="contains"
						sortBy="#{object.salesOrder.documentNo}">
						<h:outputText value="#{object.salesOrder.documentNo}" />
					</p:column>

					<p:column headerText="Order Date"
						sortBy="#{object.salesOrder.documentDate}">
						<h:outputText value="#{object.salesOrder.documentDate}">
							<f:convertDateTime
								pattern="#{salesOrderController.configuration.datePattern}" />
						</h:outputText>
					</p:column>

					<p:column headerText="Customer Name"
						filterBy="#{object.salesOrder.customer.name}"
						filterMatchMode="contains"
						sortBy="#{object.salesOrder.customer.name}">
						<h:outputText value="#{object.salesOrder.customer.name}" />
					</p:column>

					<p:column headerText="Customer NRIC"
						filterBy="#{object.salesOrder.customer.nric}"
						filterMatchMode="contains"
						sortBy="#{object.salesOrder.customer.nric}">
						<h:outputText value="#{object.salesOrder.customer.nric}" />
					</p:column>

					<p:column headerText="Customer Mobile"
						filterBy="#{object.salesOrder.customer.mobile}"
						filterMatchMode="contains"
						sortBy="#{object.salesOrder.customer.mobile}">
						<h:outputText value="#{object.salesOrder.customer.mobile}" />
					</p:column>

					<p:column headerText="Total" styleClass="align-right"
						filterBy="#{object.salesOrder.total}" filterMatchMode="contains"
						sortBy="#{object.salesOrder.total}">
						<h:outputText value="#{object.salesOrder.total}">
							<f:convertNumber
								pattern="#{salesOrderController.monetaryDecimalMask}" />
						</h:outputText>
					</p:column>
				</p:dataTable>
			</p:panel>
		</p:dialog>
	</h:form>

</ui:composition>
