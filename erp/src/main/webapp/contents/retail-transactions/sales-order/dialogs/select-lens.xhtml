<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="selectLensForm">
		<p:dialog value="Selection" widgetVar="selectLensWV" resizable="false"
			responsive="true" modal="true">

			<p:panel styleClass="dialog" header="Select Lens">
				<p:dataTable styleClass="data-table" rowIndexVar="rowIndex"
					var="object" rowKey="#{object}"
					value="#{salesOrderController.lensSelections}" paginator="true"
					paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
					rows="10" rowsPerPageTemplate="10,20,30,40,50" lazy="true">

					<p:column styleClass="index-cell">
						<p:commandButton icon="fa fa-fw fa-check"
							action="#{salesOrderController.selectLens(object)}"
							update="@(.page)" />
					</p:column>

					<p:column headerText="Company" filterBy="#{object.company.code}"
						filterMatchMode="contains" sortBy="#{object.company.code}">
						<h:outputText value="#{object.company.code}" />
					</p:column>

					<p:column headerText="Brand" filterBy="#{object.lens.brand.code}"
						filterMatchMode="contains" sortBy="#{object.lens.brand.code}">
						<h:outputText value="#{object.lens.brand.code}" />
					</p:column>

					<p:column headerText="Model" filterBy="#{object.lens.code}"
						filterMatchMode="contains" sortBy="#{object.lens.code}">
						<h:outputText value="#{object.lens.code}" />
					</p:column>
				</p:dataTable>
			</p:panel>
		</p:dialog>
	</h:form>

</ui:composition>
