<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:sec="http://www.springframework.org/security/tags">

	<ui:define name="title">
		<h:outputText value="#{taxInvoiceController.title}" />
	</ui:define>

	<ui:define name="content">
		<h:form id="indexForm" class="page">
			<p:outputPanel
				rendered="#{taxInvoiceController.page == taxInvoiceController.naviIndex}">
				<p:toolbar id="toolbar">
					<f:facet name="left">
						<h:outputText styleClass="module-name"
							value="#{taxInvoiceController.title}" />
					</f:facet>

					<f:facet name="right">
						<p:commandButton id="updateButton" icon="fa fa-edit"
							action="#{taxInvoiceController.update()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="updateButton"
							value="Update Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="postButton" icon="fa fa-envelope"
							action="#{taxInvoiceController.post()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="postButton"
							value="Post Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="unpostButton" icon="fa fa-backward"
							action="#{taxInvoiceController.unpost()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="unpostButton"
							value="Unpost Record" position="top" hideEvent="mouseleave click" />
					</f:facet>
				</p:toolbar>
				<p:sticky target="toolbar" />

				<div class="card">
					<p:toolbar>
						<f:facet name="left">
							<span class="ui-input-icon-left"> <i class="fa fa-search" />
								<p:inputText placeholder="Search"
									value="#{taxInvoiceController.keyword}">
									<p:ajax event="keyup" delay="500"
										listener="#{taxInvoiceController.loadRecord()}"
										process="@this" update="data" />
								</p:inputText>
							</span>
						</f:facet>

						<f:facet name="right">
							<h:outputText value="Invoice Date:" style="margin-right: .3rem" />

							<p:calendar id="invoiceStartDate"
								value="#{taxInvoiceController.invoiceStartDate}"
								pattern="#{taxInvoiceController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{taxInvoiceController.loadRecord()}" process="@this"
									update="data" />
								<p:ajax event="change"
									listener="#{taxInvoiceController.loadRecord()}" process="@this"
									update="data" />
							</p:calendar>

							<h:outputText value="-" style="margin: 0 .3rem 0 .3rem" />

							<p:calendar id="invoiceEndDate"
								value="#{taxInvoiceController.invoiceEndDate}"
								pattern="#{taxInvoiceController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{taxInvoiceController.loadRecord()}" process="@this"
									update="data" />
								<p:ajax event="change"
									listener="#{taxInvoiceController.loadRecord()}" process="@this"
									update="data" />
							</p:calendar>
						</f:facet>
					</p:toolbar>

					<p:remoteCommand name="ajaxRefreshPage" process="@form"
						update="@(.page)" />

					<p:scrollPanel>
						<p:dataTable styleClass="table-2000px" id="data"
							rowIndexVar="rowIndex" var="object" rowKey="#{object}"
							value="#{taxInvoiceController.objects}"
							emptyMessage="No record(s) found" widgetVar="dataTableWV"
							paginator="true"
							paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
							rows="10" rowsPerPageTemplate="10,20,30,40,50"
							selection="#{taxInvoiceController.selectedObjects}" lazy="true"
							reflow="true" resizableColumns="true">

							<p:ajax event="page" delay="150" onsuccess="ajaxRefreshPage()" />

							<p:column selectionMode="multiple"
								style="width:16px;text-align:center" />

							<p:column headerText="Date" sortBy="#{object.documentDate}">
								<h:outputText value="#{object.documentDate}">
									<f:convertDateTime
										pattern="#{taxInvoiceController.configuration.datePattern}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Invoice #" filterBy="#{object.documentNo}"
								filterMatchMode="contains" sortBy="#{object.documentNo}">
								<h:outputText value="#{object.documentNo}" />
							</p:column>

							<p:column headerText="Order #" filterBy="#{object.orderNo}"
								filterMatchMode="contains" sortBy="#{object.orderNo}">
								<h:outputText styleClass="multi-line" value="#{object.orderNo}" />
							</p:column>

							<p:column headerText="Name" styleClass="desktop-20vw"
								filterBy="#{object.customerName}" filterMatchMode="contains"
								sortBy="#{object.customerName}">
								<h:outputText value="#{object.customerName}" />
							</p:column>

							<p:column headerText="NRIC" filterBy="#{object.customerNric}"
								filterMatchMode="contains" sortBy="#{object.customerNric}">
								<h:outputText value="#{object.customerNric}" />
							</p:column>

							<p:column headerText="Mobile" filterBy="#{object.customerMobile}"
								filterMatchMode="contains" sortBy="#{object.customerMobile}">
								<h:outputText value="#{object.customerMobile}" />
							</p:column>

							<p:column headerText="Total" styleClass="align-right"
								filterBy="#{object.total}" filterMatchMode="equals"
								sortBy="#{object.total}">
								<h:outputText value="#{object.total}" />
							</p:column>

							<p:column headerText="Paid" styleClass="align-right"
								filterBy="#{object.paid}" filterMatchMode="equals"
								sortBy="#{object.paid}">
								<h:outputText value="#{object.paid}" />
							</p:column>

							<p:column headerText="Posted" styleClass="double-action-cell"
								filterBy="#{object.posted}" filterMatchMode="equals"
								sortBy="#{object.posted}">
								<f:facet name="filter">
									<p:triStateCheckbox
										converter="triStateCheckboxBooleanConverter"
										onchange="PF('dataTableWV').filter()" />
								</f:facet>
								<p:selectBooleanCheckbox value="#{object.posted}"
									disabled="true" />
							</p:column>
						</p:dataTable>
					</p:scrollPanel>
				</div>
			</p:outputPanel>
		</h:form>

		<ui:include
			src="/contents/retail-transactions/tax-invoice/update.xhtml" />

		<ui:include
			src="/contents/retail-transactions/tax-invoice/dialogs/select-customer.xhtml" />
	</ui:define>

</ui:composition>
