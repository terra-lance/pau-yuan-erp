<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="updateForm" class="page">
		<p:outputPanel
			rendered="#{brandController.page == brandController.naviUpdate}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<h:outputText styleClass="module-name"
						value="#{brandController.title} - Update Record" />
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Save" icon="fa fa-fw fa-save"
						action="#{brandController.saveUpdate()}" update="@(.page)" />
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{brandController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />
			<br />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-12 xl:col-12">
						<h6>Code</h6>
						<p:inputText styleClass="full-width read-only" id="code"
							value="#{brandController.object.code}" readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Description</h6>
						<p:inputTextarea styleClass="full-width" id="description"
							value="#{brandController.object.description}" autocomplete="off" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Brand for Frame</h6>
						<p:selectBooleanCheckbox id="frame"
							value="#{brandController.object.frame}" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Brand for Lens</h6>
						<p:selectBooleanCheckbox id="lens"
							value="#{brandController.object.lens}" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<p:toolbar>
							<f:facet name="left">
								<p:selectOneButton disabled="true">
									<f:selectItem itemLabel="Colors" />
								</p:selectOneButton>
							</f:facet>

							<f:facet name="right">
								<p:commandButton icon="fa fa-fw fa-plus" value="Add Colors"
									action="#{brandController.insertColor()}" process="@(.page)"
									update="colorTable" />
							</f:facet>
						</p:toolbar>

						<p:dataTable id="colorTable" rowIndexVar="rowIndex" var="color"
							value="#{brandController.object.listColors}">

							<p:column headerText="No." styleClass="index-cell">
								<h:outputText value="#{rowIndex + 1}" />
							</p:column>

							<p:column headerText="Color">
								<p:inputText styleClass="full-width" value="#{color.color}" />
							</p:column>

							<p:column styleClass="single-action-cell">
								<p:commandButton class="rounded-button" id="deleteButton"
									icon="fa fa-trash-alt"
									action="#{brandController.deleteColor(color)}"
									update="colorTable">
									<p:confirm header="Confirmation"
										message="Do you wish to remove this color from this brand"
										icon="ui-icon-alert" />
								</p:commandButton>
								<p:tooltip styleClass="tooltip" for="deleteButton"
									value="Remove Color" position="top"
									hideEvent="mouseleave click" />
							</p:column>
						</p:dataTable>
					</div>
				</div>
			</div>

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Created</h6>
						<p:inputText styleClass="full-width read-only" id="userCreated"
							value="#{brandController.object.userCreated.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Created</h6>
						<p:inputText styleClass="full-width read-only" id="dateCreated"
							value="#{brandController.object.dateCreated}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{brandController.configuration.timestampPattern}" />
						</p:inputText>
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Modified</h6>
						<p:inputText styleClass="full-width read-only" id="userModified"
							value="#{brandController.object.userModified.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Modified</h6>
						<p:inputText styleClass="full-width read-only" id="dateModified"
							value="#{brandController.object.dateModified}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{brandController.configuration.timestampPattern}" />
						</p:inputText>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
