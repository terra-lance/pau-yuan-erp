<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="insertForm" class="page">
		<p:outputPanel
			rendered="#{frameController.page == frameController.naviInsert}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<h:outputText styleClass="module-name"
						value="#{frameController.title} - Add Record" />
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Save" icon="fa fa-fw fa-save"
						action="#{frameController.saveInsert()}" update="@(.page)" />
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{frameController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />
			<br />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Model</h6>
						<p:inputText styleClass="full-width" id="code"
							value="#{frameController.object.code}" autocomplete="off" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Name</h6>
						<p:inputText styleClass="full-width" id="name"
							value="#{frameController.object.name}" autocomplete="off" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Description</h6>
						<p:inputTextarea styleClass="full-width" id="description"
							value="#{frameController.object.description}" rows="1"
							autocomplete="off" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Brand</h6>
						<p:outputPanel styleClass="ui-inputgroup">
							<p:inputText styleClass="full-width read-only"
								value="#{frameController.object.brand.code}" readonly="true" />
							<p:commandButton icon="fa fa-fw fa-search"
								action="#{frameController.lookupBrand()}" process="@form" />
						</p:outputPanel>
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Company</h6>
						<p:outputPanel styleClass="ui-inputgroup">
							<p:inputText styleClass="full-width read-only"
								value="#{frameController.object.company.code}" readonly="true" />
							<p:commandButton icon="fa fa-fw fa-search"
								action="#{frameController.lookupCompany()}" process="@form" />
						</p:outputPanel>
					</div>

					<div class="col-12 md:col-4 xl:col-4">
						<h6>Type</h6>
						<p:selectOneMenu styleClass="full-width"
							value="#{frameController.object.type}"
							converter="frameTypeConverter" autoWidth="false">
							<f:selectItems value="#{frameController.types}" var="type"
								itemLabel="#{type.description}" itemValue="#{type}" />
						</p:selectOneMenu>
					</div>

					<div class="col-12 md:col-4 xl:col-4">
						<h6>Material</h6>
						<p:inputText styleClass="full-width" id="material"
							value="#{frameController.object.material}" autocomplete="off" />
					</div>

					<div class="col-12 md:col-4 xl:col-4">
						<h6>Size</h6>
						<p:inputText styleClass="full-width" id="size"
							value="#{frameController.object.size}" autocomplete="off" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Actual Selling Price</h6>
						<p:inputText styleClass="full-width" id="encodeNumber"
							value="#{frameController.object.encodeNumber}" autocomplete="off">
							<p:ajax listener="#{frameController.encode()}"
								update="encodeCode" />
						</p:inputText>
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Encode Code</h6>
						<p:inputText styleClass="full-width read-only" id="encodeCode"
							value="#{frameController.object.encodeCode}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Display Selling Price</h6>
						<p:inputNumber styleClass="full-width" id="sellingPrice"
							value="#{frameController.object.sellingPrice}"
							decimalPlaces="#{frameController.configuration.monetaryDecimal}"
							emptyValue="zero" autocomplete="off" />
					</div>
				</div>

				<br />

				<div class="grid">
					<div class="col-12 md:col-12 xl:col-12">
						<p:toolbar>
							<f:facet name="left">
								<p:selectOneButton disabled="true">
									<f:selectItem itemLabel="Colors" />
								</p:selectOneButton>
							</f:facet>

							<f:facet name="right">
								<p:commandButton icon="fa fa-fw fa-plus" value="Add Colors"
									action="#{frameController.insertColor()}" process="insertForm"
									update="colorTable" />
							</f:facet>
						</p:toolbar>

						<p:dataTable id="colorTable" rowIndexVar="rowIndex" var="color"
							value="#{frameController.object.listColors}">

							<p:column headerText="No." styleClass="index-cell">
								<h:outputText value="#{rowIndex + 1}" />
							</p:column>

							<p:column headerText="Color">
								<p:inputText styleClass="full-width" value="#{color.color}" />
							</p:column>

							<p:column styleClass="single-action-cell">
								<p:commandButton class="rounded-button" id="deleteButton"
									icon="fa fa-trash-alt"
									action="#{frameController.deleteColor(color)}"
									update="colorTable">
									<p:confirm header="Confirmation"
										message="Do you wish to remove this color from this frame"
										icon="ui-icon-alert" />
								</p:commandButton>
								<p:tooltip styleClass="tooltip" for="deleteButton"
									value="Remove Color" position="top"
									hideEvent="mouseleave click" />
							</p:column>
						</p:dataTable>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
