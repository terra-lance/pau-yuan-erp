<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="detailForm" class="page">
		<p:outputPanel
			rendered="#{frameController.page == frameController.naviDetail}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<h:outputText styleClass="module-name"
						value="#{frameController.title} - Record Detail" />
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{frameController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />
			<br />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Model</h6>
						<p:inputText styleClass="full-width read-only" id="code"
							value="#{frameController.object.code}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Name</h6>
						<p:inputText styleClass="full-width read-only" id="name"
							value="#{frameController.object.name}" readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Description</h6>
						<p:inputTextarea styleClass="full-width read-only"
							id="description" value="#{frameController.object.description}"
							rows="1" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Brand</h6>
						<p:inputText styleClass="full-width read-only" id="brand"
							value="#{frameController.object.brand.code}" readonly="true" />
					</div>
					
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Company</h6>
						<p:inputText styleClass="full-width read-only" id="company"
							value="#{frameController.object.company.code}" readonly="true" />
					</div>

					<div class="col-12 md:col-4 xl:col-4">
						<h6>Type</h6>
						<p:inputText styleClass="full-width read-only" id="type"
							value="#{frameController.object.type.description}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-4 xl:col-4">
						<h6>Material</h6>
						<p:inputText styleClass="full-width read-only" id="material"
							value="#{frameController.object.material}" readonly="true" />
					</div>

					<div class="col-12 md:col-4 xl:col-4">
						<h6>Size</h6>
						<p:inputText styleClass="full-width read-only" id="size"
							value="#{frameController.object.size}" readonly="tru" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Actual Selling Price</h6>
						<p:inputText styleClass="full-width read-only" id="encodeNumber"
							value="#{frameController.object.encodeNumber}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Encode Code</h6>
						<p:inputText styleClass="full-width read-only" id="encodeCode"
							value="#{frameController.object.encodeCode}" readonly="true" />
					</div>
					
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Display Selling Price</h6>
						<p:inputNumber styleClass="full-width read-only" id="sellingPrice"
							value="#{frameController.object.sellingPrice}"
							decimalPlaces="#{frameController.configuration.monetaryDecimal}"
							emptyValue="zero" readonly="true" />
					</div>
				</div>

				<br />

				<div class="grid">
					<div class="col-12 md:col-12 xl:col-12">
						<p:toolbar>
							<f:facet name="left">
								<p:selectOneButton disabled="true">
									<f:selectItem itemLabel="Colors" />
								</p:selectOneButton>
							</f:facet>
						</p:toolbar>

						<p:dataTable id="colorTable" rowIndexVar="rowIndex" var="color"
							value="#{frameController.object.listColors}">

							<p:column headerText="No." styleClass="index-cell">
								<h:outputText value="#{rowIndex + 1}" />
							</p:column>

							<p:column headerText="Color">
								<h:outputText value="#{color.color}" />
							</p:column>
						</p:dataTable>
					</div>
				</div>
			</div>

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Created</h6>
						<p:inputText styleClass="full-width read-only" id="userCreated"
							value="#{frameController.object.userCreated.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Created</h6>
						<p:inputText styleClass="full-width read-only" id="dateCreated"
							value="#{frameController.object.dateCreated}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{frameController.configuration.timestampPattern}" />
						</p:inputText>
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Modified</h6>
						<p:inputText styleClass="full-width read-only" id="userModified"
							value="#{frameController.object.userModified.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Modified</h6>
						<p:inputText styleClass="full-width read-only" id="dateModified"
							value="#{frameController.object.dateModified}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{frameController.configuration.timestampPattern}" />
						</p:inputText>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
