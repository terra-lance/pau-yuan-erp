<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="detailForm" class="page">
		<p:outputPanel
			rendered="#{paymentMethodController.page == paymentMethodController.naviDetail}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<h:outputText styleClass="module-name"
						value="#{paymentMethodController.title} - Record Detail" />
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{paymentMethodController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />
			<br />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Code</h6>
						<p:inputText styleClass="full-width read-only" id="code"
							value="#{paymentMethodController.object.code}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Name</h6>
						<p:inputText styleClass="full-width read-only" id="name"
							value="#{paymentMethodController.object.name}" readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Description</h6>
						<p:inputTextarea styleClass="full-width read-only"
							id="description"
							value="#{paymentMethodController.object.description}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Account Code</h6>
						<p:inputText styleClass="full-width read-only" id="accountCode"
							value="#{paymentMethodController.object.accountCode}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Open Cash Register</h6>
						<p:selectBooleanCheckbox id="openCashRegister"
							value="#{paymentMethodController.object.openCashRegister}"
							disabled="true" />
					</div>
				</div>
			</div>

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Created</h6>
						<p:inputText styleClass="full-width read-only" id="userCreated"
							value="#{paymentMethodController.object.userCreated.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Created</h6>
						<p:inputText styleClass="full-width read-only" id="dateCreated"
							value="#{paymentMethodController.object.dateCreated}"
							readonly="true">
							<f:convertDateTime type="date"
								pattern="#{paymentMethodController.configuration.timestampPattern}" />
						</p:inputText>
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Modified</h6>
						<p:inputText styleClass="full-width read-only" id="userModified"
							value="#{paymentMethodController.object.userModified.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Modified</h6>
						<p:inputText styleClass="full-width read-only" id="dateModified"
							value="#{paymentMethodController.object.dateModified}"
							readonly="true">
							<f:convertDateTime type="date"
								pattern="#{paymentMethodController.configuration.timestampPattern}" />
						</p:inputText>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
