<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="insertForm" class="page">
		<p:outputPanel
			rendered="#{customerController.page == customerController.naviInsert}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<h:outputText styleClass="module-name"
						value="#{customerController.title} - Add Record" />
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Save" icon="fa fa-fw fa-save"
						action="#{customerController.saveInsert()}" update="@(.page)" />
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{customerController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Code</h6>
						<p:inputText styleClass="full-width read-only" id="code"
							value="#{customerController.object.code}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Name</h6>
						<p:inputText styleClass="full-width" id="name"
							value="#{customerController.object.name}" autocomplete="off" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Description</h6>
						<p:inputTextarea styleClass="full-width" id="description"
							value="#{customerController.object.description}" rows="1"
							autocomplete="off" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>NRIC</h6>
						<p:inputText styleClass="full-width" id="nric"
							value="#{customerController.object.nric}" autocomplete="off" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Address</h6>
						<p:inputText styleClass="full-width" id="address1"
							value="#{customerController.object.address1}" autocomplete="off" />
						<p:inputText styleClass="full-width" id="address2"
							value="#{customerController.object.address2}" autocomplete="off" />
						<p:inputText styleClass="full-width" id="address3"
							value="#{customerController.object.address3}" autocomplete="off" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Contact</h6>
						<p:outputPanel styleClass="ui-inputgroup">
							<p:outputPanel styleClass="ui-inputgroup-addon">
								<i class="fa fa-mobile-screen" />
							</p:outputPanel>
							<p:inputText styleClass="full-width" id="mobile"
								value="#{customerController.object.mobile}" autocomplete="off" />
							<p:watermark for="mobile" value="Mobile" />
						</p:outputPanel>

						<p:outputPanel styleClass="ui-inputgroup">
							<p:outputPanel styleClass="ui-inputgroup-addon">
								<i class="fa fa-house" />
							</p:outputPanel>
							<p:inputText styleClass="full-width" id="home"
								value="#{customerController.object.home}" autocomplete="off" />
							<p:watermark for="home" value="Home" />
						</p:outputPanel>

						<p:outputPanel styleClass="ui-inputgroup">
							<p:outputPanel styleClass="ui-inputgroup-addon">
								<i class="fa fa-building" />
							</p:outputPanel>
							<p:inputText styleClass="full-width" id="office"
								value="#{customerController.object.office}" autocomplete="off" />
							<p:watermark for="office" value="Office" />
						</p:outputPanel>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
