<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="detailForm" class="page">
		<p:outputPanel
			rendered="#{customerController.page == customerController.naviDetail}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<h:outputText styleClass="module-name"
						value="#{customerController.title} - Record Detail" />
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Order" icon="fa fa-fw fa-cash-register"
						action="#{customerController.order()}"
						rendered="#{sessionBean.authorize('Sales Order')}" />
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{customerController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-5 xl:col-5">
						<div class="grid">
							<div class="col-12 md:col-6 xl:col-6">
								<h6>Code</h6>
								<p:inputText styleClass="full-width read-only" id="code"
									value="#{customerController.object.code}" readonly="true" />
							</div>

							<div class="col-12 md:col-6 xl:col-6">
								<h6>Name</h6>
								<p:inputText styleClass="full-width read-only" id="name"
									value="#{customerController.object.name}" readonly="true" />
							</div>

							<div class="col-12 md:col-12 xl:col-12">
								<h6>Description</h6>
								<p:inputTextarea styleClass="full-width read-only"
									id="description"
									value="#{customerController.object.description}" rows="1"
									readonly="true" />
							</div>

							<div class="col-12 md:col-12 xl:col-12">
								<h6>NRIC</h6>
								<p:inputText styleClass="full-width read-only" id="nric"
									value="#{customerController.object.nric}" readonly="true" />
							</div>

							<div class="col-12 md:col-12 xl:col-12">
								<h6>Address</h6>
								<p:inputText styleClass="full-width read-only" id="address1"
									value="#{customerController.object.address1}" readonly="true" />
								<p:inputText styleClass="full-width read-only" id="address2"
									value="#{customerController.object.address2}" readonly="true" />
								<p:inputText styleClass="full-width read-only" id="address3"
									value="#{customerController.object.address3}" readonly="true" />
							</div>

							<div class="col-12 md:col-12 xl:col-12">
								<h6>Contact</h6>
								<p:outputPanel styleClass="ui-inputgroup">
									<p:outputPanel styleClass="ui-inputgroup-addon">
										<i class="fa fa-mobile-screen" />
									</p:outputPanel>
									<p:inputText styleClass="full-width read-only" id="mobile"
										value="#{customerController.object.mobile}" readonly="true" />
								</p:outputPanel>

								<p:outputPanel styleClass="ui-inputgroup">
									<p:outputPanel styleClass="ui-inputgroup-addon">
										<i class="fa fa-house" />
									</p:outputPanel>
									<p:inputText styleClass="full-width read-only" id="home"
										value="#{customerController.object.home}" readonly="true" />
								</p:outputPanel>

								<p:outputPanel styleClass="ui-inputgroup">
									<p:outputPanel styleClass="ui-inputgroup-addon">
										<i class="fa fa-building" />
									</p:outputPanel>
									<p:inputText styleClass="full-width read-only" id="office"
										value="#{customerController.object.office}" readonly="true" />
								</p:outputPanel>
							</div>
						</div>
					</div>

					<div class="col-12 md:col-7 xl:col-7">
						<h6>Order History</h6>

						<p:dataTable id="data" rowIndexVar="rowIndex" var="object"
							rowKey="#{object}" value="#{customerController.salesOrders}"
							emptyMessage="No record(s) found" widgetVar="dataTableWV"
							paginator="true"
							paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
							rows="10" rowsPerPageTemplate="10,20,30,40,50" lazy="true"
							reflow="true">

							<p:column headerText="Date" sortBy="#{object.documentDate}"
								sortOrder="desc">
								<h:outputText value="#{object.documentDate}">
									<f:convertDateTime type="date"
										pattern="#{customerController.configuration.datePattern}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Bill No." sortBy="#{object.documentNo}">
								<h:commandLink value="#{object.documentNo}"
									action="#{customerController.salesOrderDetail(object.id)}" />
							</p:column>

							<p:column headerText="Total" styleClass="align-right">
								<h:outputText value="#{object.total}">
									<f:convertNumber
										pattern="#{customerController.monetaryDecimalMask}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Paid" styleClass="align-right">
								<h:outputText value="#{object.paid}">
									<f:convertNumber
										pattern="#{customerController.monetaryDecimalMask}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Balance" styleClass="align-right">
								<h:outputText value="#{object.balance}">
									<f:convertNumber
										pattern="#{customerController.monetaryDecimalMask}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Collected"
								sortBy="#{object.collectionDate}">
								<h:outputText value="#{object.collectionDate}">
									<f:convertDateTime
										pattern="#{customerController.configuration.datePattern}" />
								</h:outputText>
							</p:column>
						</p:dataTable>
					</div>
				</div>
			</div>

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Created</h6>
						<p:inputText styleClass="full-width read-only" id="userCreated"
							value="#{customerController.object.userCreated.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Created</h6>
						<p:inputText styleClass="full-width read-only" id="dateCreated"
							value="#{customerController.object.dateCreated}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{customerController.configuration.timestampPattern}" />
						</p:inputText>
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Modified</h6>
						<p:inputText styleClass="full-width read-only" id="userModified"
							value="#{customerController.object.userModified.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Modified</h6>
						<p:inputText styleClass="full-width read-only" id="dateModified"
							value="#{customerController.object.dateModified}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{customerController.configuration.timestampPattern}" />
						</p:inputText>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
