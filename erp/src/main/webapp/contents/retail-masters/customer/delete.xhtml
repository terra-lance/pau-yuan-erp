<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="deleteForm" class="page">
		<p:outputPanel
			rendered="#{customerController.page == customerController.naviDelete}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<h:outputText styleClass="module-name"
						value="#{customerController.title} - Delete Record" />
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Delete" icon="fa fa-fw fa-trash-alt"
						action="#{customerController.saveDelete()}" update="@(.page)">
						<p:confirm header="Confirmation"
							message="Do you wish to delete the selected record?"
							icon="ui-icon-alert" />
					</p:commandButton>
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{customerController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Code</h6>
						<p:inputText styleClass="full-width read-only" id="code"
							value="#{customerController.object.code}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Name</h6>
						<p:inputText styleClass="full-width read-only" id="name"
							value="#{customerController.object.name}" readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Description</h6>
						<p:inputTextarea styleClass="full-width read-only"
							id="description" value="#{customerController.object.description}"
							rows="1" readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>NRIC</h6>
						<p:inputText styleClass="full-width read-only" id="nric"
							value="#{customerController.object.nric}" readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Address</h6>
						<p:inputText styleClass="full-width read-only" id="address1"
							value="#{customerController.object.address1}" readonly="true" />
						<p:inputText styleClass="full-width read-only" id="address2"
							value="#{customerController.object.address2}" readonly="true" />
						<p:inputText styleClass="full-width read-only" id="address3"
							value="#{customerController.object.address3}" readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Contact</h6>
						<p:outputPanel styleClass="ui-inputgroup">
							<p:outputPanel styleClass="ui-inputgroup-addon">
								<i class="fa fa-mobile-screen" />
							</p:outputPanel>
							<p:inputText styleClass="full-width read-only" id="mobile"
								value="#{customerController.object.mobile}" readonly="true" />
						</p:outputPanel>

						<p:outputPanel styleClass="ui-inputgroup">
							<p:outputPanel styleClass="ui-inputgroup-addon">
								<i class="fa fa-house" />
							</p:outputPanel>
							<p:inputText styleClass="full-width read-only" id="home"
								value="#{customerController.object.home}" readonly="true" />
						</p:outputPanel>

						<p:outputPanel styleClass="ui-inputgroup">
							<p:outputPanel styleClass="ui-inputgroup-addon">
								<i class="fa fa-building" />
							</p:outputPanel>
							<p:inputText styleClass="full-width read-only" id="office"
								value="#{customerController.object.office}" readonly="true" />
						</p:outputPanel>
					</div>
				</div>
			</div>

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Created</h6>
						<p:inputText styleClass="full-width read-only" id="userCreated"
							value="#{customerController.object.userCreated.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Created</h6>
						<p:inputText styleClass="full-width read-only" id="dateCreated"
							value="#{customerController.object.dateCreated}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{customerController.configuration.timestampPattern}" />
						</p:inputText>
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Modified</h6>
						<p:inputText styleClass="full-width read-only" id="userModified"
							value="#{customerController.object.userModified.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Modified</h6>
						<p:inputText styleClass="full-width read-only" id="dateModified"
							value="#{customerController.object.dateModified}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{customerController.configuration.timestampPattern}" />
						</p:inputText>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
