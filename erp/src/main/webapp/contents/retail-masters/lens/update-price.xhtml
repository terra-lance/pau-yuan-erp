<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="updatePriceForm" class="page">
		<p:outputPanel
			rendered="#{lensController.page == lensController.naviUpdatePrice}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<h:outputText styleClass="module-name"
						value="#{lensController.title} - Update Price" />
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Save" icon="fa fa-fw fa-save"
						action="#{lensController.saveUpdate()}" update="@(.page)" />
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{lensController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Lens</h6>
						<p:inputText styleClass="full-width read-only" id="summary"
							value="#{lensController.object.summary}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Type</h6>
						<p:inputText styleClass="full-width read-only" id="type"
							value="#{lensController.object.type.description}" readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Price</h6>
						<p:dataTable id="priceTable" rowIndexVar="rowIndex" var="price"
							value="#{lensController.object.listPrices}">

							<p:column headerText="No." styleClass="index-cell">
								<h:outputText value="#{rowIndex + 1}" />
							</p:column>

							<p:column headerText="Design">
								<h:outputText value="#{price.lensDesign}" />
							</p:column>

							<p:column headerText="Index">
								<h:outputText value="#{price.lensIndex}" />
							</p:column>

							<p:column headerText="Coating">
								<h:outputText value="#{price.lensCoating}" />
							</p:column>

							<p:column headerText="Corridor">
								<h:outputText value="#{price.lensCorridor}" />
							</p:column>

							<p:column headerText="Price">
								<p:inputNumber styleClass="full-width data-table"
									value="#{price.price}"
									decimalPlaces="#{lensController.configuration.monetaryDecimal}"
									emptyValue="zero" autocomplete="off" />
							</p:column>

							<p:column styleClass="single-action-cell">
								<p:commandButton class="rounded-button" id="printButton"
									icon="fa fa-print"
									action="#{lensController.printLensLabelByLine(price.id)}"
									style="margin-right: .3rem" ajax="false" />
								<p:tooltip styleClass="tooltip" for="printButton"
									value="Print Frame Label" position="top"
									hideEvent="mouseleave click" />
							</p:column>
						</p:dataTable>
					</div>
				</div>
			</div>

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Created</h6>
						<p:inputText styleClass="full-width read-only" id="userCreated"
							value="#{lensController.object.userCreated.name}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Created</h6>
						<p:inputText styleClass="full-width read-only" id="dateCreated"
							value="#{lensController.object.dateCreated}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{lensController.configuration.timestampPattern}" />
						</p:inputText>
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Modified</h6>
						<p:inputText styleClass="full-width read-only" id="userModified"
							value="#{lensController.object.userModified.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Modified</h6>
						<p:inputText styleClass="full-width read-only" id="dateModified"
							value="#{lensController.object.dateModified}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{lensController.configuration.timestampPattern}" />
						</p:inputText>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
