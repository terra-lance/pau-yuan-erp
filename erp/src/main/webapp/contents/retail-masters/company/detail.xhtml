<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="detailForm" class="page">
		<p:outputPanel
			rendered="#{companyController.page == companyController.naviDetail}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<h:outputText styleClass="module-name"
						value="#{companyController.title} - Record Detail" />
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{companyController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />
			<br />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Code</h6>
						<p:inputText styleClass="full-width read-only" id="code"
							value="#{companyController.object.code}" readonly="true" />
					</div>
					
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Name</h6>
						<p:inputText styleClass="full-width read-only" id="name"
							value="#{companyController.object.name}" readonly="true" />
					</div>

					<div class="col-12 md:col-12 xl:col-12">
						<h6>Description</h6>
						<p:inputTextarea styleClass="full-width read-only"
							id="description" value="#{companyController.object.description}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-4 xl:col-4">
						<h6>Contact Number</h6>
						<p:inputText styleClass="full-width read-only" id="contactNo"
							value="#{companyController.object.contactNo}" readonly="true" />
					</div>

					<div class="col-12 md:col-4 xl:col-4">
						<h6>Fax No</h6>
						<p:inputText styleClass="full-width read-only" id="faxNo"
							value="#{companyController.object.faxNo}" readonly="true" />
					</div>

					<div class="col-12 md:col-4 xl:col-4">
						<h6>Contact Number</h6>
						<p:inputText styleClass="full-width read-only" id="handphoneNo"
							value="#{companyController.object.handphoneNo}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Company for Lens</h6>
						<p:selectBooleanCheckbox id="lens"
							value="#{companyController.object.lens}" disabled="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Company for Frame</h6>
						<p:selectBooleanCheckbox id="frame"
							value="#{companyController.object.frame}" disabled="true" />
					</div>
				</div>
			</div>

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Created</h6>
						<p:inputText styleClass="full-width read-only" id="userCreated"
							value="#{companyController.object.userCreated.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Created</h6>
						<p:inputText styleClass="full-width read-only" id="dateCreated"
							value="#{companyController.object.dateCreated}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{companyController.configuration.timestampPattern}" />
						</p:inputText>
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Modified</h6>
						<p:inputText styleClass="full-width read-only" id="userModified"
							value="#{companyController.object.userModified.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Modified</h6>
						<p:inputText styleClass="full-width read-only" id="dateModified"
							value="#{companyController.object.dateModified}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{companyController.configuration.timestampPattern}" />
						</p:inputText>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
