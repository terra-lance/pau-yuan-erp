<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:sec="http://www.springframework.org/security/tags">

	<ui:define name="title">
		<h:outputText value="#{userController.title}" />
	</ui:define>

	<ui:define name="content">
		<h:form id="indexForm" class="page">
			<p:outputPanel
				rendered="#{userController.page == userController.naviIndex}">
				<p:toolbar id="toolbar">
					<f:facet name="left">
						<h:outputText styleClass="module-name"
							value="#{userController.title}" />
					</f:facet>

					<f:facet name="right">
						<p:commandButton value="Add Record" icon="fa fa-fw fa-plus"
							action="#{userController.insert()}" update="@(.page)" />
					</f:facet>
				</p:toolbar>
				<p:sticky target="toolbar" />

				<br />

				<div class="card">
					<p:dataTable id="data" rowIndexVar="rowIndex" var="object"
						value="#{userController.objects}"
						emptyMessage="No record(s) found" widgetVar="dataTableWV"
						paginator="true"
						paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
						rows="10" rowsPerPageTemplate="10,20,30,40,50" lazy="true"
						reflow="true" resizableColumns="true">

						<p:column headerText="No." styleClass="index-cell">
							<h:outputText value="#{rowIndex + 1}" />
						</p:column>

						<p:column headerText="Username" filterBy="#{object.username}"
							filterMatchMode="contains" sortBy="#{object.username}">
							<h:outputText value="#{object.username}" />
						</p:column>

						<p:column headerText="Name" filterBy="#{object.name}"
							filterMatchMode="contains" sortBy="#{object.name}">
							<h:outputText value="#{object.name}" />
						</p:column>

						<p:column headerText="Email" filterBy="#{object.email}"
							filterMatchMode="contains" sortBy="#{object.email}">
							<h:outputText value="#{object.email}" />
						</p:column>

						<p:column styleClass="quadruple-action-cell">
							<p:commandButton class="rounded-button" id="detailButton"
								icon="fa fa-search" action="#{userController.detail(object.id)}"
								update="@(.page)" />
							<p:tooltip styleClass="tooltip" for="detailButton"
								value="Record Detail" position="top"
								hideEvent="mouseleave click" />

							<p:commandButton class="rounded-button" id="updateButton"
								icon="fa fa-edit" action="#{userController.update(object.id)}"
								update="@(.page)" />
							<p:tooltip styleClass="tooltip" for="updateButton"
								value="Update Record" position="top"
								hideEvent="mouseleave click" />

							<p:commandButton class="rounded-button" id="deleteButton"
								icon="fa fa-trash-alt"
								action="#{userController.delete(object.id)}" update="@(.page)" />
							<p:tooltip styleClass="tooltip" for="deleteButton"
								value="Delete Record" position="top"
								hideEvent="mouseleave click" />

							<p:commandButton class="rounded-button" id="resetButton"
								icon="fa fa-sync-alt"
								action="#{userController.reset(object.id)}" update="@(.page)" />
							<p:tooltip styleClass="tooltip" for="resetButton"
								value="Reset Password" position="top"
								hideEvent="mouseleave click" />
						</p:column>
					</p:dataTable>
				</div>
			</p:outputPanel>
		</h:form>

		<ui:include src="/contents/base-masters/user/detail.xhtml" />

		<ui:include src="/contents/base-masters/user/insert.xhtml" />

		<ui:include src="/contents/base-masters/user/update.xhtml" />

		<ui:include src="/contents/base-masters/user/delete.xhtml" />

		<ui:include src="/contents/base-masters/user/reset.xhtml" />
	</ui:define>

</ui:composition>
