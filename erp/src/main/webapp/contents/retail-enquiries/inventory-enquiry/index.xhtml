<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:sec="http://www.springframework.org/security/tags">

	<ui:define name="title">
		<h:outputText value="#{inventoryEnquiryController.title}" />
	</ui:define>

	<ui:define name="content">
		<h:form id="indexForm" class="page">
			<p:outputPanel
				rendered="#{inventoryEnquiryController.page == inventoryEnquiryController.naviIndex}">
				<p:toolbar id="toolbar">
					<f:facet name="left">
						<h:outputText styleClass="module-name"
							value="#{inventoryEnquiryController.title}" />
					</f:facet>

					<f:facet name="right">
						<p:commandButton value="Frame Inventory Detail"
							icon="fa fa-fw fa-magnifying-glass-plus"
							action="#{inventoryEnquiryController.detail()}" update="@(.page)" />
						<h:commandLink>
							<p:graphicImage name="/images/excel.png" width="24" />
							<p:dataExporter type="xls" target="summaryData"
								fileName="data-file" />
						</h:commandLink>
					</f:facet>
				</p:toolbar>
				<p:sticky target="toolbar" />

				<div class="card">
					<p:toolbar>
						<f:facet name="left">
							<span class="ui-input-icon-left"> <i class="fa fa-search" />
								<p:inputText placeholder="Search"
									value="#{inventoryEnquiryController.summaryKeyword}">
									<p:ajax event="keyup" delay="500"
										listener="#{inventoryEnquiryController.loadSummary()}"
										process="@this" update="summaryData" />
								</p:inputText>
							</span>
						</f:facet>
					</p:toolbar>

					<p:dataTable id="summaryData" rowIndexVar="rowIndex" var="summary"
						value="#{inventoryEnquiryController.summaries}"
						emptyMessage="No record(s) found" widgetVar="summaryDataTableWV"
						paginator="true"
						paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
						paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
						currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
						rows="10" rowsPerPageTemplate="10,20,30,40,50" lazy="true">

						<p:column headerText="No." styleClass="index-cell">
							<h:outputText value="#{rowIndex + 1}" />
						</p:column>

						<p:column headerText="Model" filterBy="#{summary.frameCode}"
							filterMatchMode="contains" sortBy="#{summary.frameCode}">
							<h:outputText value="#{summary.frameCode}" />
						</p:column>

						<p:column headerText="Material"
							filterBy="#{summary.frameMaterial}" filterMatchMode="contains"
							sortBy="#{summary.frameMaterial}">
							<h:outputText value="#{summary.frameMaterial}" />
						</p:column>

						<p:column headerText="Size" filterBy="#{summary.frameSize}"
							filterMatchMode="contains" sortBy="#{summary.frameSize}">
							<h:outputText value="#{summary.frameSize}" />
						</p:column>

						<p:column headerText="Brand" filterBy="#{summary.brandName}"
							filterMatchMode="contains" sortBy="#{summary.brandName}">
							<h:outputText value="#{summary.brandName}" />
						</p:column>

						<p:column headerText="Color" filterBy="#{summary.color}"
							filterMatchMode="contains" sortBy="#{summary.color}">
							<h:outputText value="#{summary.color}" />
						</p:column>

						<p:column headerText="Quantity" styleClass="align-right"
							sortBy="#{summary.weight}">
							<h:outputText value="#{summary.quantity}" />
						</p:column>
					</p:dataTable>
				</div>
			</p:outputPanel>
		</h:form>

		<ui:include
			src="/contents/retail-enquiries/inventory-enquiry/detail.xhtml" />
	</ui:define>

</ui:composition>
