<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:sec="http://www.springframework.org/security/tags">

	<ui:define name="title">
		<h:outputText value="#{salesItemEnquiryController.title}" />
	</ui:define>

	<ui:define name="content">
		<h:form id="indexForm" class="page">
			<p:outputPanel
				rendered="#{salesItemEnquiryController.page == salesItemEnquiryController.naviIndex}">
				<p:toolbar id="toolbar">
					<f:facet name="left">
						<h:outputText styleClass="module-name"
							value="#{salesItemEnquiryController.title}" />
					</f:facet>

					<f:facet name="right">
						<h:commandLink>
							<p:graphicImage name="/images/excel.png" width="24" />
							<p:dataExporter type="xls" target="data"
								fileName="data-file" />
						</h:commandLink>
					</f:facet>
				</p:toolbar>
				<p:sticky target="toolbar" />

				<div class="card">
					<p:toolbar>
						<f:facet name="left">
							<span class="ui-input-icon-left"> <i class="fa fa-search" />
								<p:inputText placeholder="Search"
									value="#{salesItemEnquiryController.keyword}">
									<p:ajax event="keyup" delay="500"
										listener="#{salesItemEnquiryController.loadRecord()}"
										process="@this" update="data" />
								</p:inputText>
							</span>
						</f:facet>

						<f:facet name="right">
							<h:outputText value="Order Date:" style="margin-right: .3rem" />

							<p:calendar id="orderStartDate"
								value="#{salesItemEnquiryController.orderStartDate}"
								pattern="#{salesItemEnquiryController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{salesItemEnquiryController.loadRecord()}"
									process="@this" update="data" />
								<p:ajax event="change"
									listener="#{salesItemEnquiryController.loadRecord()}"
									process="@this" update="data" />
							</p:calendar>

							<h:outputText value="-" style="margin: 0 .3rem 0 .3rem" />

							<p:calendar id="orderEndDate"
								value="#{salesItemEnquiryController.orderEndDate}"
								pattern="#{salesItemEnquiryController.configuration.datePattern}"
								style="margin-right: .3rem">
								<p:ajax event="dateSelect"
									listener="#{salesItemEnquiryController.loadRecord()}"
									process="@this" update="data" />
								<p:ajax event="change"
									listener="#{salesItemEnquiryController.loadRecord()}"
									process="@this" update="data" />
							</p:calendar>
						</f:facet>
					</p:toolbar>

					<p:remoteCommand name="ajaxRefreshPage" process="@form"
						update="@(.page)" />

					<p:scrollPanel>
						<p:dataTable styleClass="table-2000px" id="data"
							rowIndexVar="rowIndex" var="object"
							value="#{salesItemEnquiryController.objects}"
							emptyMessage="No record(s) found" widgetVar="dataTableWV"
							paginator="true"
							paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
							paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
							currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
							rows="10" rowsPerPageTemplate="10,20,30,40,50" lazy="true">

							<p:ajax event="page" delay="150" onsuccess="ajaxRefreshPage()" />

							<p:column headerText="No." styleClass="index-cell">
								<h:outputText value="#{rowIndex + 1}" />
							</p:column>

							<p:column headerText="Order" filterBy="#{object.salesOrder}"
								filterMatchMode="contains" sortBy="#{object.salesOrder}">
								<h:outputText value="#{object.salesOrder}" />
							</p:column>

							<p:column headerText="Order Date" sortBy="#{object.salesDate}">
								<h:outputText value="#{object.salesDate}">
									<f:convertDateTime
										pattern="#{salesItemEnquiryController.configuration.datePattern}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Collection Date"
								sortBy="#{object.collectionDate}">
								<h:outputText value="#{object.collectionDate}">
									<f:convertDateTime
										pattern="#{salesItemEnquiryController.configuration.datePattern}" />
								</h:outputText>
							</p:column>

							<p:column headerText="Customer" filterBy="#{object.customerName}"
								filterMatchMode="contains" sortBy="#{object.customerName}">
								<h:outputText value="#{object.customerName}" />
							</p:column>

							<p:column headerText="NRIC" filterBy="#{object.customerNric}"
								filterMatchMode="contains" sortBy="#{object.customerNric}">
								<h:outputText value="#{object.customerNric}" />
							</p:column>

							<p:column headerText="Home #" filterBy="#{object.customerHome}"
								filterMatchMode="contains" sortBy="#{object.customerHome}">
								<h:outputText value="#{object.customerHome}" />
							</p:column>

							<p:column headerText="Mobile #"
								filterBy="#{object.customerMobile}" filterMatchMode="contains"
								sortBy="#{object.customerMobile}">
								<h:outputText value="#{object.customerMobile}" />
							</p:column>

							<p:column headerText="Office #"
								filterBy="#{object.customerOffice}" filterMatchMode="contains"
								sortBy="#{object.customerOffice}">
								<h:outputText value="#{object.customerOffice}" />
							</p:column>

							<p:column headerText="Item Description" styleClass="desktop-30vw"
								filterBy="#{object.itemDescription}" filterMatchMode="contains"
								sortBy="#{object.itemDescription}">
								<h:outputText value="#{object.itemDescription}" />
							</p:column>

							<p:column headerText="Barcode" filterBy="#{object.serialNo}"
								filterMatchMode="contains" sortBy="#{object.serialNo}">
								<h:outputText value="#{object.serialNo}" />
							</p:column>
						</p:dataTable>
					</p:scrollPanel>
				</div>
			</p:outputPanel>
		</h:form>
	</ui:define>

</ui:composition>
