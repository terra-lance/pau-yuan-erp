<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:sec="http://www.springframework.org/security/tags">

	<ui:define name="title">
		<h:outputText value="#{frameUnitCostReportController.title}" />
	</ui:define>

	<ui:define name="content">
		<h:form id="indexForm" class="page">
			<p:outputPanel
				rendered="#{frameUnitCostReportController.page == frameUnitCostReportController.naviIndex}">
				<p:toolbar id="toolbar">
					<f:facet name="left">
						<h:outputText styleClass="module-name"
							value="#{frameUnitCostReportController.title}" />
					</f:facet>

					<f:facet name="right">
						<p:commandButton value="Generate Excel" icon="fa fa-fw fa-print"
							action="#{frameUnitCostReportController.generateExcel()}"
							ajax="false" />

						<p:commandButton value="Generate PDF" icon="fa fa-fw fa-print"
							action="#{frameUnitCostReportController.generatePdf()}"
							ajax="false" />
					</f:facet>
				</p:toolbar>
				<p:sticky target="toolbar" />

				<br />

				<div class="card">
					<div class="grid">
						<div class="col-12 md:col-6 xl:col-6">
							<h6>Start Date</h6>
							<p:calendar styleClass="full-width" id="startDate"
								value="#{frameUnitCostReportController.startDate}"
								pattern="#{frameUnitCostReportController.configuration.datePattern}" />
						</div>

						<div class="col-12 md:col-6 xl:col-6">
							<h6>End Date</h6>
							<p:calendar styleClass="full-width" id="endDate"
								value="#{frameUnitCostReportController.endDate}"
								pattern="#{frameUnitCostReportController.configuration.datePattern}" />
						</div>
					</div>
				</div>
			</p:outputPanel>
		</h:form>
	</ui:define>

</ui:composition>
