<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:sec="http://www.springframework.org/security/tags">

	<ui:define name="title">
		<h:outputText value="#{userController.title}" />
	</ui:define>

	<ui:define name="content">
		<h:form id="indexForm" class="page">
			<p:outputPanel
				rendered="#{userController.page == userController.naviIndex}">
				<p:toolbar id="toolbar">
					<f:facet name="left">
						<h:outputText styleClass="module-name"
							value="#{userController.title}" />
					</f:facet>

					<f:facet name="right">
						<p:commandButton id="detailButton" icon="fa fa-search"
							action="#{userController.detail()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="detailButton"
							value="Record Detail" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="insertButton" icon="fa fa-plus"
							action="#{userController.insert()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="insertButton"
							value="Add Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="updateButton" icon="fa fa-edit"
							action="#{userController.update()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="updateButton"
							value="Update Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="deleteButton" icon="fa fa-trash-alt"
							action="#{userController.delete()}" update="@(.page)"
							style="margin-right: .3rem" />
						<p:tooltip styleClass="tooltip" for="deleteButton"
							value="Delete Record" position="top" hideEvent="mouseleave click" />

						<p:commandButton id="resetButton" icon="fa fa-sync-alt"
							action="#{userController.reset()}" update="@(.page)" />
						<p:tooltip styleClass="tooltip" for="resetButton"
							value="Reset Password" position="top"
							hideEvent="mouseleave click" />
					</f:facet>
				</p:toolbar>
				<p:sticky target="toolbar" />

				<div class="card">
					<p:toolbar>
						<f:facet name="left">
							<span class="ui-input-icon-left"> <i class="fa fa-search" />
								<p:inputText placeholder="Search"
									value="#{userController.keyword}">
									<p:ajax event="keyup" delay="500"
										listener="#{userController.loadRecord()}" process="@this"
										update="data" />
								</p:inputText>
							</span>
						</f:facet>
					</p:toolbar>

					<p:dataTable id="data" rowIndexVar="rowIndex" var="object"
						value="#{userController.objects}"
						emptyMessage="No record(s) found" widgetVar="dataTableWV"
						paginator="true"
						paginatorPosition="#{sessionBean.userPreference.paginatorPosition}"
						rows="10" rowsPerPageTemplate="10,20,30,40,50"
						selection="#{userController.selectedObjects}" lazy="true"
						reflow="true">

						<p:ajax event="page" delay="150" onsuccess="ajaxRefreshPage()" />

						<p:ajax event="rowDblselect" listener="#{userController.detail}"
							update="@(.page)" global="false" />

						<p:column selectionMode="multiple"
							style="width:16px;text-align:center" />

						<p:column headerText="No." styleClass="index-cell">
							<h:outputText value="#{rowIndex + 1}" />
						</p:column>

						<p:column headerText="Username" filterBy="#{object.username}"
							filterMatchMode="contains" sortBy="#{object.username}">
							<h:outputText value="#{object.username}" />
						</p:column>

						<p:column headerText="Name" filterBy="#{object.name}"
							filterMatchMode="contains" sortBy="#{object.name}">
							<h:outputText value="#{object.name}" />
						</p:column>

						<p:column headerText="Email" filterBy="#{object.email}"
							filterMatchMode="contains" sortBy="#{object.email}">
							<h:outputText value="#{object.email}" />
						</p:column>
					</p:dataTable>
				</div>
			</p:outputPanel>
		</h:form>

		<ui:include src="/contents/common/base-masters/user/detail.xhtml" />

		<ui:include src="/contents/common/base-masters/user/insert.xhtml" />

		<ui:include src="/contents/common/base-masters/user/update.xhtml" />

		<ui:include src="/contents/common/base-masters/user/delete.xhtml" />

		<ui:include src="/contents/common/base-masters/user/reset.xhtml" />
	</ui:define>

</ui:composition>
