<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="resetForm" class="page">
		<p:outputPanel
			rendered="#{userController.page == userController.naviReset}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<div class="title">
						<h:outputText styleClass="module-name"
							value="#{userController.title} - Reset Password" />
					</div>
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Reset" icon="fa fa-fw fa-sync-alt"
						action="#{userController.saveReset()}" update="@(.page)">
						<p:confirm header="Confirmation"
							message="Do you wish to reset password for this user?"
							icon="ui-icon-alert" />
					</p:commandButton>
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{userController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />
			<br />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Username</h6>
						<p:inputText styleClass="full-width read-only" id="username"
							value="#{userController.object.username}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Name</h6>
						<p:inputText styleClass="full-width read-only" id="name"
							value="#{userController.object.name}" readonly="true" />
					</div>
				</div>

				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Password</h6>
						<p:password styleClass="full-width" id="resetPassword"
							value="#{userController.resetPassword}" autocomplete="off" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Confirm Password</h6>
						<p:password styleClass="full-width" id="confirmResetPassword"
							value="#{userController.confirmResetPassword}" autocomplete="off" />
					</div>
				</div>
			</div>

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Created</h6>
						<p:inputText styleClass="full-width read-only" id="userCreated"
							value="#{userController.object.userCreated.name}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Created</h6>
						<p:inputText styleClass="full-width read-only" id="dateCreated"
							value="#{userController.object.dateCreated}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{userController.configuration.timestampPattern}" />
						</p:inputText>
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Modified</h6>
						<p:inputText styleClass="full-width read-only" id="userModified"
							value="#{userController.object.userModified.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Modified</h6>
						<p:inputText styleClass="full-width read-only" id="dateModified"
							value="#{userController.object.dateModified}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{userController.configuration.timestampPattern}" />
						</p:inputText>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
