<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<h:form id="deleteForm" class="page">
		<p:outputPanel
			rendered="#{userGroupController.page == userGroupController.naviDelete}">
			<p:toolbar id="toolbar">
				<f:facet name="left">
					<h:outputText styleClass="module-name"
						value="#{userGroupController.title} - Delete Record" />
				</f:facet>

				<f:facet name="right">
					<p:commandButton value="Delete" icon="fa fa-fw fa-trash-alt"
						action="#{userGroupController.saveDelete()}" update="@(.page)">
						<p:confirm header="Confirmation"
							message="Do you wish to delete the selected record?"
							icon="ui-icon-alert" />
					</p:commandButton>
					<p:commandButton value="Close" icon="fa fa-fw fa-close"
						action="#{userGroupController.home()}" update="@(.page)" />
				</f:facet>
			</p:toolbar>
			<p:sticky target="toolbar" />
			<br />

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-6">
						<h6>Code</h6>
						<p:inputText styleClass="full-width read-only" id="code"
							value="#{userGroupController.object.code}" readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-6">
						<h6>Name</h6>
						<p:inputText styleClass="full-width read-only" id="name"
							value="#{userGroupController.object.name}" readonly="true" />
					</div>
				</div>

				<div class="grid">
					<div class="col-12 md:col-12 xl:col-12">
						<h6>Description</h6>
						<p:inputTextarea styleClass="full-width read-only"
							id="description"
							value="#{userGroupController.object.description}" readonly="true" />
					</div>
				</div>

				<h6>Access Permissions</h6>
				<p:dataTable rowIndexVar="rowIndex" var="object" rowKey="#{object}"
					value="#{userGroupController.object.accesses}">

					<p:column headerText="No." styleClass="index-cell">
						<h:outputText value="#{rowIndex + 1}" />
					</p:column>

					<p:column headerText="Module">
						<h:outputText value="#{object.module.name}" />
					</p:column>

					<p:column styleClass="align-center" headerText="View">
						<p:selectBooleanCheckbox value="#{object.viewRights}"
							disabled="true" />
					</p:column>

					<p:column styleClass="align-center" headerText="Add">
						<p:selectBooleanCheckbox value="#{object.addRights}"
							disabled="true" />
					</p:column>

					<p:column styleClass="align-center" headerText="Update">
						<p:selectBooleanCheckbox value="#{object.updateRights}"
							disabled="true" />
					</p:column>

					<p:column styleClass="align-center" headerText="Delete">
						<p:selectBooleanCheckbox value="#{object.deleteRights}"
							disabled="true" />
					</p:column>

					<p:column styleClass="align-center" headerText="Print">
						<p:selectBooleanCheckbox value="#{object.printRights}"
							disabled="true" />
					</p:column>
				</p:dataTable>
			</div>

			<div class="card">
				<div class="grid">
					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Created</h6>
						<p:inputText styleClass="full-width read-only" id="userCreated"
							value="#{userGroupController.object.userCreated.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Created</h6>
						<p:inputText styleClass="full-width read-only" id="dateCreated"
							value="#{userGroupController.object.dateCreated}" readonly="true">
							<f:convertDateTime type="date"
								pattern="#{userGroupController.configuration.timestampPattern}" />
						</p:inputText>
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>User Modified</h6>
						<p:inputText styleClass="full-width read-only" id="userModified"
							value="#{userGroupController.object.userModified.name}"
							readonly="true" />
					</div>

					<div class="col-12 md:col-6 xl:col-3">
						<h6>Date Modified</h6>
						<p:inputText styleClass="full-width read-only" id="dateModified"
							value="#{userGroupController.object.dateModified}"
							readonly="true">
							<f:convertDateTime type="date"
								pattern="#{userGroupController.configuration.timestampPattern}" />
						</p:inputText>
					</div>
				</div>
			</div>
		</p:outputPanel>
	</h:form>

</ui:composition>
